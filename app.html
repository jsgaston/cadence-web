<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadence — Comunidad</title>
<link rel="icon" href="cadence-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0E1014; --surface:#16191F; --surface-2:#1E222B; --line:#2A2F3A;
    --accent:#7C9AFF; --accent-deep:#3A5BD0; --text:#E8EAF0; --muted:#9AA3B2;
    --display:"Fraunces",Georgia,serif; --body:"Inter",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--ink);color:var(--text);font-family:var(--body);
    line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
  body::before{content:"";position:fixed;inset:0;z-index:-1;
    background:radial-gradient(1000px 500px at 50% -10%, rgba(124,154,255,.14), transparent 60%);}
  a{color:var(--accent);text-decoration:none}

  .topbar{position:fixed;top:16px;left:0;right:0;display:flex;justify-content:space-between;
    align-items:center;padding:0 20px;z-index:20}
  .back{font-size:.9rem;color:var(--muted)}
  .back:hover{color:var(--text)}
  .lang{display:flex;gap:4px;background:rgba(22,25,31,.8);backdrop-filter:blur(8px);
    border:1px solid var(--line);border-radius:999px;padding:4px}
  .lang-btn{border:0;background:transparent;color:var(--muted);cursor:pointer;
    font-family:var(--body);font-size:.82rem;font-weight:600;letter-spacing:.04em;
    padding:5px 11px;border-radius:999px}
  .lang-btn.active{background:var(--accent);color:#0b0d12}

  .wrap{max-width:560px;margin:0 auto;padding:72px 24px 40px}
  .brand{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:8px}
  .brand img{width:44px;height:44px;object-fit:contain}
  .brand h1{font-family:var(--display);font-weight:500;font-size:1.8rem}
  .sub{text-align:center;color:var(--muted);margin-bottom:36px}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:32px}
  .hidden{display:none}

  .prompt{text-align:center;margin-bottom:22px;color:var(--muted)}
  .gbtn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;
    padding:13px 18px;border-radius:999px;border:0;cursor:pointer;
    background:#fff;color:#1f2330;font-family:var(--body);font-weight:600;font-size:1rem}
  .gbtn:hover{background:#eef1f7}
  .gbtn img{width:20px;height:20px}

  .profile{display:flex;align-items:center;gap:16px;margin-bottom:8px}
  .avatar{width:64px;height:64px;border-radius:50%;border:2px solid var(--line);object-fit:cover}
  .pname{font-family:var(--display);font-weight:500;font-size:1.35rem;line-height:1.1}
  .pmail{color:var(--muted);font-size:.9rem}

  label{display:block;font-size:.82rem;letter-spacing:.04em;text-transform:uppercase;
    color:var(--accent);font-weight:600;margin:26px 0 10px}
  .row{display:flex;gap:10px}
  input[type=text]{flex:1;background:var(--surface-2);border:1px solid var(--line);
    border-radius:12px;padding:12px 14px;color:var(--text);font-family:var(--body);font-size:1rem}
  input[type=text]:focus{outline:none;border-color:var(--accent)}
  .btn{padding:12px 20px;border-radius:12px;border:0;cursor:pointer;
    background:var(--accent);color:#0b0d12;font-family:var(--body);font-weight:600}
  .btn:hover{background:#93acff}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--text);
    border-radius:999px;padding:9px 16px;font-weight:500;cursor:pointer;font-family:var(--body)}
  .btn-ghost:hover{border-color:var(--accent)}

  .status{min-height:20px;margin-top:14px;font-size:.9rem;color:var(--muted)}
  .soon{margin-top:28px;padding-top:20px;border-top:1px solid var(--line);
    color:var(--muted);font-size:.9rem}
  .soon b{color:var(--text);font-weight:600}
  .foot{text-align:center;margin-top:24px}
</style>
</head>
<body>

<div class="topbar">
  <a class="back" href="index.html" data-i18n="back"></a>
  <nav class="lang" aria-label="Idioma / Language">
    <button class="lang-btn" data-lang="es">ES</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </nav>
</div>

<div class="wrap">
  <div class="brand">
    <img src="cadence-logo.png" alt="Cadence">
    <h1>Cadence</h1>
  </div>
  <p class="sub" data-i18n="sub"></p>

  <!-- VISTA: no conectado -->
  <div id="loginView" class="card">
    <p class="prompt" data-i18n="prompt"></p>
    <button id="loginBtn" class="gbtn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="">
      <span data-i18n="login_btn"></span>
    </button>
    <div id="loginStatus" class="status"></div>
  </div>

  <!-- VISTA: conectado -->
  <div id="profileView" class="card hidden">
    <div class="profile">
      <img id="avatar" class="avatar" src="" alt="">
      <div>
        <div id="pname" class="pname"></div>
        <div id="pmail" class="pmail"></div>
      </div>
    </div>

    <label for="np" data-i18n="np_label"></label>
    <div class="row">
      <input id="np" type="text" data-i18n-ph="np_ph">
      <button id="saveBtn" class="btn" data-i18n="save_btn"></button>
    </div>
    <div id="status" class="status"></div>

    <div class="soon" data-i18n="soon"></div>
    <div class="foot">
      <button id="logoutBtn" class="btn-ghost" data-i18n="logout_btn"></button>
    </div>
  </div>
</div>

<!-- ============ TEXTOS / TEXTS ============ -->
<script>
const I18N = {
  es: {
    _title: "Cadence — Comunidad",
    back: "← Inicio",
    sub: "Comunidad de oyentes — versión inicial",
    prompt: "Inicia sesión para crear tu perfil y empezar.",
    login_btn: "Iniciar sesión con Google",
    np_label: "¿Qué estás escuchando?",
    np_ph: "Artista, canción, podcast...",
    save_btn: "Guardar",
    soon: "<b>Próximamente:</b> seguir a otros oyentes, ver qué escuchan, chat y descubrir música libre. Esto es solo el comienzo.",
    logout_btn: "Cerrar sesión",
    m_opening: "Abriendo Google...",
    m_login_fail: "No se pudo iniciar sesión: ",
    m_saving: "Guardando...",
    m_saved: "Guardado ✓",
    m_save_fail: "No se pudo guardar: ",
    m_notice: "Aviso: ",
    listener: "Oyente"
  },
  en: {
    _title: "Cadence — Community",
    back: "← Home",
    sub: "A community of listeners — early version",
    prompt: "Sign in to create your profile and get started.",
    login_btn: "Sign in with Google",
    np_label: "What are you listening to?",
    np_ph: "Artist, song, podcast...",
    save_btn: "Save",
    soon: "<b>Coming soon:</b> follow other listeners, see what they play, chat, and discover free music. This is just the beginning.",
    logout_btn: "Sign out",
    m_opening: "Opening Google...",
    m_login_fail: "Could not sign in: ",
    m_saving: "Saving...",
    m_saved: "Saved ✓",
    m_save_fail: "Could not save: ",
    m_notice: "Notice: ",
    listener: "Listener"
  }
};
let currentLang = "es";
function t(k){ return (I18N[currentLang] || I18N.es)[k] || k; }
function setLang(lang){
  currentLang = lang;
  const d = I18N[lang] || I18N.es;
  document.documentElement.lang = lang;
  document.title = d._title;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n'); if(d[k]!==undefined) el.innerHTML=d[k];});
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{
    const k=el.getAttribute('data-i18n-ph'); if(d[k]!==undefined) el.placeholder=d[k];});
  document.querySelectorAll('.lang-btn').forEach(b=>
    b.classList.toggle('active', b.dataset.lang===lang));
  try{ localStorage.setItem('cadence_lang', lang); }catch(e){}
}
document.querySelectorAll('.lang-btn').forEach(b=>
  b.addEventListener('click', ()=>setLang(b.dataset.lang)));
let _saved=null; try{ _saved=localStorage.getItem('cadence_lang'); }catch(e){}
const _auto=(navigator.language||'es').toLowerCase().startsWith('en')?'en':'es';
setLang(_saved || _auto);
</script>

<!-- ============ Firebase ============ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCK00pCtwUbJRmxPb5aEwdUDX3KK4q0WIA",
  authDomain: "cadence-500901.firebaseapp.com",
  projectId: "cadence-500901",
  storageBucket: "cadence-500901.firebasestorage.app",
  messagingSenderId: "995587221821",
  appId: "1:995587221821:web:3567f36d6ef84a61863d54"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

const loginView = document.getElementById("loginView");
const profileView = document.getElementById("profileView");
const loginStatus = document.getElementById("loginStatus");
const status = document.getElementById("status");
const npInput = document.getElementById("np");

document.getElementById("loginBtn").addEventListener("click", async () => {
  loginStatus.textContent = t("m_opening");
  try { await signInWithPopup(auth, provider); }
  catch (e) { loginStatus.textContent = t("m_login_fail") + e.message; }
});

document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth));

document.getElementById("saveBtn").addEventListener("click", async () => {
  const user = auth.currentUser; if (!user) return;
  status.textContent = t("m_saving");
  try {
    await setDoc(doc(db, "users", user.uid),
      { nowPlaying: npInput.value.trim(), updatedAt: serverTimestamp() },
      { merge: true });
    status.textContent = t("m_saved");
  } catch (e) { status.textContent = t("m_save_fail") + e.message; }
});

onAuthStateChanged(auth, async (user) => {
  if (user) {
    const ref = doc(db, "users", user.uid);
    try {
      await setDoc(ref, {
        displayName: user.displayName || "",
        email: user.email || "",
        photoURL: user.photoURL || "",
        updatedAt: serverTimestamp()
      }, { merge: true });
      const snap = await getDoc(ref);
      const data = snap.exists() ? snap.data() : {};
      npInput.value = data.nowPlaying || "";
    } catch (e) { status.textContent = t("m_notice") + e.message; }
    document.getElementById("avatar").src = user.photoURL || "cadence-logo.png";
    document.getElementById("pname").textContent = user.displayName || t("listener");
    document.getElementById("pmail").textContent = user.email || "";
    loginView.classList.add("hidden");
    profileView.classList.remove("hidden");
  } else {
    profileView.classList.add("hidden");
    loginView.classList.remove("hidden");
    loginStatus.textContent = "";
  }
});
</script>
</body>
</html>
