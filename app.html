<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadence — Comunidad</title>
<link rel="icon" href="cadence-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0E1014; --surface:#16191F; --surface-2:#1E222B; --line:#2A2F3A;
    --accent:#7C9AFF; --accent-deep:#3A5BD0; --text:#E8EAF0; --muted:#9AA3B2;
    --display:"Fraunces",Georgia,serif; --body:"Inter",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--ink);color:var(--text);font-family:var(--body);
    line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
  body::before{content:"";position:fixed;inset:0;z-index:-1;
    background:radial-gradient(1000px 500px at 50% -10%, rgba(124,154,255,.14), transparent 60%);}
  a{color:var(--accent);text-decoration:none}

  .topbar{position:fixed;top:16px;left:0;right:0;display:flex;justify-content:space-between;
    align-items:center;padding:0 20px;z-index:20}
  .back{font-size:.9rem;color:var(--muted)}
  .back:hover{color:var(--text)}
  .lang{display:flex;gap:4px;background:rgba(22,25,31,.8);backdrop-filter:blur(8px);
    border:1px solid var(--line);border-radius:999px;padding:4px}
  .lang-btn{border:0;background:transparent;color:var(--muted);cursor:pointer;
    font-family:var(--body);font-size:.82rem;font-weight:600;letter-spacing:.04em;
    padding:5px 11px;border-radius:999px}
  .lang-btn.active{background:var(--accent);color:#0b0d12}

  .wrap{max-width:600px;margin:0 auto;padding:72px 24px 60px}
  .brand{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:8px}
  .brand img{width:44px;height:44px;object-fit:contain}
  .brand h1{font-family:var(--display);font-weight:500;font-size:1.8rem}
  .sub{text-align:center;color:var(--muted);margin-bottom:32px}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:28px;margin-bottom:20px}
  .hidden{display:none}

  .prompt{text-align:center;margin-bottom:22px;color:var(--muted)}
  .gbtn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;
    padding:13px 18px;border-radius:999px;border:0;cursor:pointer;
    background:#fff;color:#1f2330;font-family:var(--body);font-weight:600;font-size:1rem}
  .gbtn:hover{background:#eef1f7}
  .gbtn img{width:20px;height:20px}

  .profile{display:flex;align-items:center;gap:16px}
  .avatar{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;background:var(--accent);color:#0b0d12;font-weight:600;font-size:1.5rem}
  .pname{font-family:var(--display);font-weight:500;font-size:1.3rem;line-height:1.1}
  .pmail{color:var(--muted);font-size:.85rem}

  label{display:block;font-size:.78rem;letter-spacing:.06em;text-transform:uppercase;
    color:var(--accent);font-weight:600;margin:22px 0 8px}
  textarea{width:100%;background:var(--surface-2);border:1px solid var(--line);
    border-radius:12px;padding:12px 14px;color:var(--text);font-family:var(--body);
    font-size:1rem;resize:vertical;min-height:80px}
  textarea:focus{outline:none;border-color:var(--accent)}
  .btn{padding:11px 20px;border-radius:12px;border:0;cursor:pointer;margin-top:10px;
    background:var(--accent);color:#0b0d12;font-family:var(--body);font-weight:600}
  .btn:hover{background:#93acff}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--text);
    border-radius:999px;padding:9px 16px;font-weight:500;cursor:pointer;font-family:var(--body)}
  .btn-ghost:hover{border-color:var(--accent)}
  .status{min-height:18px;margin-top:8px;font-size:.85rem;color:var(--muted)}

  h2{font-family:var(--display);font-weight:500;font-size:1.3rem;margin-bottom:4px}
  .wall-sub{color:var(--muted);font-size:.88rem;margin-bottom:16px}
  .feed-item{display:flex;align-items:center;gap:12px;padding:12px 0;
    border-bottom:1px solid rgba(42,47,58,.5)}
  .feed-item:last-child{border-bottom:0}
  .fav{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;background:var(--accent);color:#0b0d12;font-weight:600;flex-shrink:0}
  .fname{color:var(--accent);font-size:.9rem}
  .flabel{font-size:.95rem}
  .ftime{color:var(--muted);font-size:.78rem}
  .empty{color:var(--muted);text-align:center;padding:20px 0}
  .signout{text-align:center;margin-top:8px}
</style>
</head>
<body>

<div class="topbar">
  <a class="back" href="index.html" data-i18n="back"></a>
  <nav class="lang" aria-label="Idioma / Language">
    <button class="lang-btn" data-lang="es">ES</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </nav>
</div>

<div class="wrap">
  <div class="brand">
    <img src="cadence-logo.png" alt="Cadence">
    <h1>Cadence</h1>
  </div>
  <p class="sub" data-i18n="sub"></p>

  <!-- No conectado -->
  <div id="loginView" class="card">
    <p class="prompt" data-i18n="prompt"></p>
    <button id="loginBtn" class="gbtn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="">
      <span data-i18n="login_btn"></span>
    </button>
    <div id="loginStatus" class="status"></div>
  </div>

  <!-- Conectado: perfil -->
  <div id="profileView" class="card hidden">
    <div class="profile">
      <div id="avatar" class="avatar"></div>
      <div>
        <div id="pname" class="pname"></div>
        <div id="pmail" class="pmail"></div>
      </div>
    </div>
    <label data-i18n="bio_label"></label>
    <textarea id="bio" maxlength="300" data-i18n-ph="bio_ph"></textarea>
    <button id="saveBio" class="btn" data-i18n="save_bio"></button>
    <div id="bioStatus" class="status"></div>
    <div class="signout">
      <button id="logoutBtn" class="btn-ghost" data-i18n="logout_btn"></button>
    </div>
  </div>

  <!-- Muro -->
  <div id="wallView" class="card hidden">
    <h2 data-i18n="wall_title"></h2>
    <p class="wall-sub" data-i18n="wall_sub"></p>
    <div id="feed"><p class="empty" data-i18n="wall_loading"></p></div>
  </div>
</div>

<!-- ========= TEXTOS / TEXTS ========= -->
<script>
const I18N = {
  es: {
    _title:"Cadence — Comunidad", back:"← Inicio",
    sub:"Comunidad de oyentes", prompt:"Inicia sesión para ver la comunidad.",
    login_btn:"Iniciar sesión con Google",
    bio_label:"Sobre ti", bio_ph:"Cuenta algo sobre tus gustos musicales...",
    save_bio:"Guardar biografía", logout_btn:"Cerrar sesión",
    wall_title:"Muro", wall_sub:"Lo último que escucha la comunidad.",
    wall_loading:"Cargando...", wall_empty:"Aún no hay actividad.",
    m_opening:"Abriendo Google...", m_login_fail:"No se pudo iniciar sesión: ",
    m_saving:"Guardando...", m_saved:"Biografía guardada ✓", m_save_fail:"No se pudo guardar: ",
    listener:"Oyente",
    t_now:"hace un momento", t_min:"hace # min", t_hour:"hace # h"
  },
  en: {
    _title:"Cadence — Community", back:"← Home",
    sub:"A community of listeners", prompt:"Sign in to see the community.",
    login_btn:"Sign in with Google",
    bio_label:"About you", bio_ph:"Tell us about your taste in music...",
    save_bio:"Save bio", logout_btn:"Sign out",
    wall_title:"Wall", wall_sub:"What the community is listening to.",
    wall_loading:"Loading...", wall_empty:"No activity yet.",
    m_opening:"Opening Google...", m_login_fail:"Could not sign in: ",
    m_saving:"Saving...", m_saved:"Bio saved ✓", m_save_fail:"Could not save: ",
    listener:"Listener",
    t_now:"just now", t_min:"# min ago", t_hour:"# h ago"
  }
};
let currentLang="es";
function t(k){ return (I18N[currentLang]||I18N.es)[k] || k; }
function setLang(lang){
  currentLang=lang;
  const d=I18N[lang]||I18N.es;
  document.documentElement.lang=lang; document.title=d._title;
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n'); if(d[k]!==undefined) el.innerHTML=d[k];});
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{const k=el.getAttribute('data-i18n-ph'); if(d[k]!==undefined) el.placeholder=d[k];});
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));
  try{ localStorage.setItem('cadence_lang',lang); }catch(e){}
  if (window._renderFeed) window._renderFeed();
}
document.querySelectorAll('.lang-btn').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));
let _s=null; try{ _s=localStorage.getItem('cadence_lang'); }catch(e){}
setLang(_s || ((navigator.language||'es').toLowerCase().startsWith('en')?'en':'es'));

function timeAgo(date){
  if(!date) return t('t_now');
  const diff=(Date.now()-date.getTime())/1000;
  if(diff<60) return t('t_now');
  if(diff<3600) return t('t_min').replace('#', Math.floor(diff/60));
  if(diff<86400) return t('t_hour').replace('#', Math.floor(diff/3600));
  return date.toLocaleDateString(currentLang==='en'?'en-GB':'es-ES',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}
</script>

<!-- ========= Firebase ========= -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, serverTimestamp,
         collection, query, orderBy, limit, onSnapshot }
  from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCK00pCtwUbJRmxPb5aEwdUDX3KK4q0WIA",
  authDomain: "cadence-500901.firebaseapp.com",
  projectId: "cadence-500901",
  storageBucket: "cadence-500901.firebasestorage.app",
  messagingSenderId: "995587221821",
  appId: "1:995587221821:web:3567f36d6ef84a61863d54"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

const loginView=document.getElementById("loginView");
const profileView=document.getElementById("profileView");
const wallView=document.getElementById("wallView");
const loginStatus=document.getElementById("loginStatus");
const bioStatus=document.getElementById("bioStatus");
const bioBox=document.getElementById("bio");

let feedData=[];
window._renderFeed=function(){
  const cont=document.getElementById("feed");
  if(!cont) return;
  if(feedData.length===0){ cont.innerHTML='<p class="empty">'+t('wall_empty')+'</p>'; return; }
  cont.innerHTML="";
  feedData.forEach(it=>{
    const row=document.createElement("div"); row.className="feed-item";
    const initial=(it.name||t('listener')).trim().charAt(0).toUpperCase();
    row.innerHTML =
      '<div class="fav">'+initial+'</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div class="fname">'+escapeHtml(it.name||t('listener'))+'</div>'+
        '<div class="flabel">'+escapeHtml(it.label||'—')+'</div>'+
        '<div class="ftime">'+timeAgo(it.playedAt)+'</div>'+
      '</div>';
    cont.appendChild(row);
  });
};
function escapeHtml(s){ return (s||"").replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

document.getElementById("loginBtn").addEventListener("click", async ()=>{
  loginStatus.textContent=t('m_opening');
  try{ await signInWithPopup(auth, provider); }
  catch(e){ loginStatus.textContent=t('m_login_fail')+e.message; }
});
document.getElementById("logoutBtn").addEventListener("click", ()=>signOut(auth));

document.getElementById("saveBio").addEventListener("click", async ()=>{
  const u=auth.currentUser; if(!u) return;
  bioStatus.textContent=t('m_saving');
  try{
    await setDoc(doc(db,"users",u.uid),
      { bio: bioBox.value.trim(), updatedAt: serverTimestamp() }, { merge:true });
    bioStatus.textContent=t('m_saved');
  }catch(e){ bioStatus.textContent=t('m_save_fail')+e.message; }
});

// Muro en tiempo real.
const feedQuery = query(collection(db,"feed"), orderBy("playedAt","desc"), limit(50));
onSnapshot(feedQuery, snap=>{
  feedData = snap.docs.map(d=>{
    const x=d.data();
    return { name:x.name, label:x.label, type:x.type,
             playedAt: x.playedAt && x.playedAt.toDate ? x.playedAt.toDate() : null };
  });
  window._renderFeed();
}, err=>{ console.error(err); });

onAuthStateChanged(auth, async (user)=>{
  if(user){
    await setDoc(doc(db,"users",user.uid), {
      displayName:user.displayName||"", email:user.email||"",
      photoURL:user.photoURL||"", updatedAt:serverTimestamp()
    }, { merge:true });
    const snap=await getDoc(doc(db,"users",user.uid));
    bioBox.value = (snap.exists()? snap.data().bio : "") || "";
    document.getElementById("avatar").textContent=(user.displayName||"O").trim().charAt(0).toUpperCase();
    document.getElementById("pname").textContent=user.displayName||t('listener');
    document.getElementById("pmail").textContent=user.email||"";
    loginView.classList.add("hidden");
    profileView.classList.remove("hidden");
    wallView.classList.remove("hidden");
  }else{
    profileView.classList.add("hidden");
    wallView.classList.add("hidden");
    loginView.classList.remove("hidden");
    loginStatus.textContent="";
  }
});
</script>
</body>
</html>
