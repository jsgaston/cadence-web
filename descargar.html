<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadence — Descargar</title>
<link rel="icon" href="cadence-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600&family=Noto+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0E1014;--surface:#16191F;--surface-2:#1E222B;--line:#2A2F3A;
    --accent:#7C9AFF;--text:#E8EAF0;--muted:#9AA3B2;
    --display:"Fraunces",Georgia,serif;--body:"Inter",system-ui,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--ink);color:var(--text);font-family:var(--body);line-height:1.65;-webkit-font-smoothing:antialiased}
  body::before{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(1000px 520px at 50% -8%,rgba(124,154,255,.14),transparent 60%);}
  a{color:var(--accent);text-decoration:none}
  .topbar{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--line)}
  .topbar img{width:28px;height:28px}.topbar .name{font-family:var(--display);font-size:1.2rem;font-weight:500}
  .langsel{margin-left:auto;background:var(--surface);border:1px solid var(--line);color:var(--text);border-radius:999px;padding:6px 11px;font-family:var(--body);font-size:.82rem;cursor:pointer}
  .langsel:focus{outline:none;border-color:var(--accent)}
  .back{color:var(--muted);font-size:.9rem;margin-left:14px}
  .wrap{max-width:680px;margin:0 auto;padding:50px 22px;text-align:center}
  .logo{width:88px;height:88px;margin-bottom:18px}
  h1{font-family:var(--display);font-weight:500;font-size:2.6rem;margin-bottom:8px}
  .lead{color:var(--muted);font-size:1.1rem;max-width:520px;margin:0 auto 30px}
  .soon{display:inline-block;background:var(--surface-2);border:1px solid var(--line);color:var(--muted);padding:14px 28px;border-radius:999px;font-size:1.05rem;cursor:default}
  .qrbox{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:24px;margin:30px auto 0;max-width:320px}
  .qrbox #qr{display:flex;justify-content:center}
  .qrbox #qr img,.qrbox #qr canvas{border-radius:10px;background:#fff;padding:10px}
  .qrcap{color:var(--muted);font-size:.88rem;margin-top:14px}
  .steps{text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:28px;margin:34px 0}
  .steps h2{font-family:var(--display);font-weight:500;font-size:1.3rem;margin-bottom:16px}
  .step{display:flex;gap:14px;margin-bottom:16px}
  .num{width:30px;height:30px;border-radius:50%;background:var(--accent);color:#0b0d12;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .step p{color:var(--muted);font-size:.95rem}
  .feat{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-top:30px}
  .fcard{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px;text-align:left}
  .fcard .ic{font-size:1.5rem;margin-bottom:6px}
  .fcard h3{font-family:var(--display);font-weight:500;font-size:1rem;margin-bottom:4px}
  .fcard p{color:var(--muted);font-size:.85rem}
  .note{color:var(--muted);font-size:.85rem;margin-top:30px}
  html[lang="zh"] body{font-family:"Noto Sans SC","Inter",sans-serif}
  html[lang="ja"] body{font-family:"Noto Sans JP","Inter",sans-serif}
  html[lang="ar"] body{font-family:"Noto Sans Arabic","Inter",sans-serif}
  html[dir="rtl"] .step{flex-direction:row-reverse;text-align:right}
  html[dir="rtl"] .steps,html[dir="rtl"] .fcard{text-align:right}
  html[dir="rtl"] .langsel{margin-left:0;margin-right:auto}
</style>
</head>
<body>
<div class="topbar">
  <img src="cadence-logo.png" alt=""><span class="name">Cadence</span>
  <select class="langsel" id="langsel" aria-label="Idioma">
    <option value="es">Español</option><option value="en">English</option><option value="pt">Português</option>
    <option value="fr">Français</option><option value="it">Italiano</option><option value="de">Deutsch</option>
    <option value="ru">Русский</option><option value="zh">中文</option><option value="ja">日本語</option><option value="ar">العربية</option>

  <a class="back" href="index.html" data-i18n="back"></a>
</div>

<div class="wrap">
  <img class="logo" src="cadence-logo.png" alt="Cadence">

  <p class="lead" data-i18n="d_lead"></p>
  <span class="soon" data-i18n="d_soon"></span>

  <div class="qrbox">
    <div id="qr"></div>
    <p class="qrcap" data-i18n="qr_cap"></p>
  </div>

  <div class="steps">
    <h2 data-i18n="steps_title"></h2>
    <div class="step"><div class="num">1</div><p data-i18n="step1"></p></div>
    <div class="step"><div class="num">2</div><p data-i18n="step2"></p></div>
    <div class="step"><div class="num">3</div><p data-i18n="step3"></p></div>
    <div class="step"><div class="num">4</div><p data-i18n="step4"></p></div>
  </div>

  <div class="feat">
    <div class="fcard"><div class="ic">🎵</div><h3 data-i18n="f1h"></h3><p data-i18n="f1p"></p></div>
    <div class="fcard"><div class="ic">📚</div><h3 data-i18n="f2h"></h3><p data-i18n="f2p"></p></div>
    <div class="fcard"><div class="ic">🎙️</div><h3 data-i18n="f3h"></h3><p data-i18n="f3p"></p></div>
    <div class="fcard"><div class="ic">🌍</div><h3 data-i18n="f4h"></h3><p data-i18n="f4p"></p></div>
  </div>

  <p class="note" data-i18n="note"></p>
</div>

const RTL=["ar"];
let qrDrawn=false;
function drawQR(){
  const box=document.getElementById("qr"); box.innerHTML="";
  new QRCode(box,{text:APP_URL,width:180,height:180,colorDark:"#0E1014",colorLight:"#ffffff"});
  qrDrawn=true;
}
function setLang(lang){
  const d=I18N[lang]||I18N.es;
  document.documentElement.lang=lang;
  document.documentElement.dir=RTL.includes(lang)?"rtl":"ltr";
  document.title=d._t;
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n'); if(d[k]!==undefined) el.textContent=d[k];});
  document.getElementById('langsel').value=lang;
  try{localStorage.setItem('cadence_lang',lang);}catch(e){}
}
document.getElementById('langsel').addEventListener('change',e=>setLang(e.target.value));
let saved=null; try{saved=localStorage.getItem('cadence_lang');}catch(e){}
const nav=(navigator.language||'es').toLowerCase().slice(0,2);
setLang(saved||(I18N[nav]?nav:'es'));
if(window.QRCode) drawQR(); else window.addEventListener('load',()=>{ if(window.QRCode&&!qrDrawn) drawQR(); });
