<style>
  :root{
    --ink:#0E1014; --surface:#16191F; --surface-2:#1E222B; --line:#2A2F3A;
    --accent:#7C9AFF; --accent-deep:#3A5BD0; --text:#E8EAF0; --muted:#9AA3B2;
    --display:"Fraunces",Georgia,serif; --body:"Inter",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--ink);color:var(--text);font-family:var(--body);
    line-height:1.65;-webkit-font-smoothing:antialiased}
  body::before{content:"";position:fixed;inset:0;z-index:-1;
    background:radial-gradient(1100px 560px at 50% -8%, rgba(124,154,255,.14), transparent 60%);}
  a{color:var(--accent);text-decoration:none}
  .container{max-width:1000px;margin:0 auto;padding:0 24px}
  nav.top{position:sticky;top:0;z-index:30;background:rgba(14,16,20,.82);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .nav-inner{max-width:1000px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;gap:18px}
  .nav-brand{display:flex;align-items:center;gap:10px;font-family:var(--display);font-size:1.2rem;font-weight:500}
  .nav-brand img{width:28px;height:28px}
  .nav-links{display:flex;gap:18px;margin-left:8px;flex-wrap:wrap}
  .nav-links a{color:var(--muted);font-size:.92rem;font-weight:500}
  .nav-links a:hover{color:var(--text)}
  .langsel{margin-left:auto;background:var(--surface);border:1px solid var(--line);color:var(--text);
    border-radius:999px;padding:7px 12px;font-family:var(--body);font-size:.85rem;cursor:pointer}
  .langsel:focus{outline:none;border-color:var(--accent)}
  .hero{text-align:center;padding:72px 0 56px}
  .hero img.logo{width:84px;height:84px;margin-bottom:18px}
  .wordmark{font-family:var(--display);font-weight:500;font-size:3.4rem;line-height:1}
  .tagline{color:var(--muted);font-size:1.05rem;margin-top:6px;letter-spacing:.02em}
  .thesis{max-width:620px;margin:24px auto 0;font-size:1.18rem;color:#cfd5e2}
  .cta-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:30px}
  .btn{display:inline-block;padding:12px 22px;border-radius:999px;font-weight:600;font-size:.98rem;cursor:pointer;border:1px solid transparent}
  .btn-primary{background:var(--accent);color:#0b0d12}
  .btn-primary:hover{background:#93acff}
  .btn-ghost{border-color:var(--line);color:var(--text)}
  .btn-ghost:hover{border-color:var(--accent)}
  section{padding:46px 0}
  .eyebrow{color:var(--accent);font-size:.8rem;letter-spacing:.14em;text-transform:uppercase;font-weight:600;margin-bottom:10px}
  h2{font-family:var(--display);font-weight:500;font-size:2rem;margin-bottom:14px}
  .lead{font-size:1.1rem;color:#cfd5e2;max-width:680px}
  .explore{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;margin-top:8px}
  .xcard{display:block;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:26px;transition:border-color .15s,transform .15s}
  .xcard:hover{border-color:var(--accent);transform:translateY(-2px)}
  .xcard .ic{font-size:1.8rem;margin-bottom:10px}
  .xcard h3{font-family:var(--display);font-weight:500;font-size:1.3rem;color:var(--text);margin-bottom:6px}
  .xcard p{color:var(--muted);font-size:.95rem}
  .xcard .go{color:var(--accent);font-size:.9rem;font-weight:600;margin-top:12px;display:inline-block}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-top:8px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px}
  .card h3{display:flex;align-items:center;gap:9px;font-family:var(--display);font-weight:500;font-size:1.12rem;margin-bottom:8px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
  .card p{color:var(--muted);font-size:.93rem}
  .support{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:36px}
  footer{border-top:1px solid var(--line);padding:30px 0;margin-top:30px}
  .foot-inner{display:flex;gap:20px;flex-wrap:wrap;align-items:center;color:var(--muted);font-size:.9rem}
  .foot-inner a{color:var(--muted)} .foot-inner a:hover{color:var(--text)}
  .foot-inner .sp{margin-left:auto}
  /* Soporte de fuentes para idiomas no latinos */
  html[lang="zh"] body{font-family:"Noto Sans SC","Inter",system-ui,sans-serif}
  html[lang="ja"] body{font-family:"Noto Sans JP","Inter",system-ui,sans-serif}
  html[lang="ar"] body{font-family:"Noto Sans Arabic","Inter",system-ui,sans-serif}
  /* Derecha a izquierda para árabe */
  html[dir="rtl"] .nav-links{margin-left:0;margin-right:8px}
  html[dir="rtl"] .langsel{margin-left:0;margin-right:auto}
  html[dir="rtl"] .foot-inner .sp{margin-left:0;margin-right:auto}
</style>

  it:{_title:"Cadence — La tua musica, libera",nav_home:"Home",nav_community:"Comunità",nav_music:"La mia musica",nav_radio:"Radio",nav_free:"Libera",nav_download:"Scarica",nav_tailor:"Su misura",tagline:"La tua musica, libera.",thesis:"Un lettore di musica, audiolibri, podcast e radio per Android — gratuito, senza pubblicità e sostenuto dalle donazioni. E ora anche nel tuo browser.",cta_explore:"Esplora Cadence",cta_community:"Entra nella comunità",s1_eyebrow:"Cos'è",s1_title:"Musica senza barriere",s1_lead:"Cadence riproduce la tua musica, i tuoi audiolibri, i tuoi podcast e migliaia di stazioni radio. Niente pubblicità, niente tracciamento, niente abbonamenti. La tua musica resta sul tuo Google Drive, e Cadence la riproduce soltanto — sul telefono o nel browser.",x_eyebrow:"Esplora",x_title:"Cadence nel tuo browser",x1_h:"La mia musica",x1_p:"Ascolta la musica del tuo Google Drive direttamente nel browser.",x2_h:"La radio sulla mappa",x2_p:"Una mappa del mondo con migliaia di stazioni. Ascolta la radio da ovunque.",x3_h:"Comunità",x3_p:"Crea il tuo profilo e scopri cosa ascolta chi ha i tuoi gusti, in tempo reale.",x4_h:"Musica su misura",x4_p:"Playlist che durano esattamente il tuo tragitto o la tua pausa. Per tempo o per BPM.",x5_h:"Musica libera",x5_p:"Scopri e scarica musica con licenza libera (Creative Commons), legale e gratuita.",x_go:"Apri →",s2_eyebrow:"Cosa offre",s2_title:"Tutto in uno",c1_h:"Musica",c1_p:"La tua libreria con playlist, equalizzatore, riproduzione casuale intelligente e crossfade.",c2_h:"Audiolibri",c2_p:"Riprendi da dove eri, regola la velocità e imposta il timer.",c3_h:"Podcast",c3_p:"Cerca, iscriviti e scarica episodi per ascoltarli offline.",c4_h:"Radio",c4_p:"Migliaia di stazioni da tutto il mondo, con le tue preferite a un tocco.",c5_h:"Backup su Drive",c5_p:"La tua musica e le tue playlist, al sicuro sul tuo Google Drive.",c6_h:"Comunità",c6_p:"Profili, biografie e una bacheca dal vivo di ciò che la gente ascolta.",s3_eyebrow:"Sostieni il progetto",s3_title:"Gratis per sempre",s3_p:"Cadence non ha pubblicità né abbonamenti, e non li avrà mai. Sopravvive solo con l'aiuto di chi vuole che continui a esistere. Se ti piace, offri un caffè.",cta_coffee:"Offri un caffè",cta_paypal:"Sostieni con PayPal",f_privacy:"Privacy",f_contact:"Contatti",f_support:"Sostieni"},
  de:{_title:"Cadence — Deine Musik, frei",nav_home:"Start",nav_community:"Community",nav_music:"Meine Musik",nav_radio:"Radio",nav_free:"Frei",nav_download:"Herunterladen",nav_tailor:"Nach Maß",tagline:"Deine Musik, frei.",thesis:"Ein Player für Musik, Hörbücher, Podcasts und Radio für Android — kostenlos, werbefrei und durch Spenden getragen. Und jetzt auch im Browser.",cta_explore:"Cadence entdecken",cta_community:"Zur Community",s1_eyebrow:"Was es ist",s1_title:"Musik ohne Barrieren",s1_lead:"Cadence spielt deine eigene Musik, deine Hörbücher, deine Podcasts und Tausende Radiosender. Keine Werbung, kein Tracking, keine Gebühren. Deine Musik bleibt in deinem eigenen Google Drive, und Cadence spielt sie nur ab — auf dem Handy oder im Browser.",x_eyebrow:"Entdecken",x_title:"Cadence in deinem Browser",x1_h:"Meine Musik",x1_p:"Höre die Musik aus deinem eigenen Google Drive direkt im Browser.",x2_h:"Radio auf der Karte",x2_p:"Eine Weltkarte mit Tausenden Sendern. Höre Radio von überall.",x3_h:"Community",x3_p:"Erstelle dein Profil und entdecke in Echtzeit, was Menschen mit deinem Geschmack hören.",x4_h:"Musik nach Maß",x4_p:"Playlists, die genau so lange dauern wie dein Weg oder deine Pause. Nach Zeit oder BPM.",x5_h:"Freie Musik",x5_p:"Entdecke und lade Musik mit freier Lizenz (Creative Commons) herunter, legal und kostenlos.",x_go:"Öffnen →",s2_eyebrow:"Was es bietet",s2_title:"Alles in einem",c1_h:"Musik",c1_p:"Deine Bibliothek mit Playlists, Equalizer, smartem Zufallsmix und Crossfade.",c2_h:"Hörbücher",c2_p:"Mach dort weiter, wo du warst, passe Tempo und Sleep-Timer an.",c3_h:"Podcasts",c3_p:"Suche, abonniere und lade Folgen zum Offline-Hören herunter.",c4_h:"Radio",c4_p:"Tausende Sender weltweit, deine Favoriten mit einem Tipp.",c5_h:"Drive-Backup",c5_p:"Deine Musik und Playlists, sicher in deinem eigenen Google Drive.",c6_h:"Community",c6_p:"Profile, Biografien und eine Live-Wand mit dem, was Leute gerade hören.",s3_eyebrow:"Unterstütze das Projekt",s3_title:"Für immer kostenlos",s3_p:"Cadence hat keine Werbung und keine Gebühren — und wird es nie haben. Es lebt nur durch die Hilfe derer, die wollen, dass es weiter existiert. Wenn es dir gefällt, spendier einen Kaffee.",cta_coffee:"Einen Kaffee spendieren",cta_paypal:"Über PayPal unterstützen",f_privacy:"Datenschutz",f_contact:"Kontakt",f_support:"Unterstützen"},
  ru:{_title:"Cadence — Ваша музыка, свободно",nav_home:"Главная",nav_community:"Сообщество",nav_music:"Моя музыка",nav_radio:"Радио",nav_free:"Свободная",nav_download:"Скачать",nav_tailor:"По времени",tagline:"Ваша музыка, свободно.",thesis:"Проигрыватель музыки, аудиокниг, подкастов и радио для Android — бесплатный, без рекламы и на пожертвования. А теперь и в браузере.",cta_explore:"Узнать о Cadence",cta_community:"Войти в сообщество",s1_eyebrow:"Что это",s1_title:"Музыка без преград",s1_lead:"Cadence воспроизводит вашу музыку, аудиокниги, подкасты и тысячи радиостанций. Без рекламы, без слежки, без подписок. Ваша музыка хранится в вашем личном Google Диске, а Cadence просто её проигрывает — на телефоне или в браузере.",x_eyebrow:"Обзор",x_title:"Cadence в вашем браузере",x1_h:"Моя музыка",x1_p:"Слушайте музыку со своего Google Диска прямо в браузере.",x2_h:"Радио на карте",x2_p:"Карта мира с тысячами станций. Слушайте радио из любой точки.",x3_h:"Сообщество",x3_p:"Создайте профиль и узнавайте в реальном времени, что слушают люди с похожим вкусом.",x4_h:"Музыка по времени",x4_p:"Плейлисты ровно на время поездки или перерыва. По времени или по BPM.",x5_h:"Свободная музыка",x5_p:"Открывайте и скачивайте музыку со свободной лицензией (Creative Commons) — легально и бесплатно.",x_go:"Открыть →",s2_eyebrow:"Что внутри",s2_title:"Всё в одном",c1_h:"Музыка",c1_p:"Ваша библиотека с плейлистами, эквалайзером, умным перемешиванием и кроссфейдом.",c2_h:"Аудиокниги",c2_p:"Продолжайте с того же места, меняйте скорость и таймер сна.",c3_h:"Подкасты",c3_p:"Ищите, подписывайтесь и скачивайте выпуски для прослушивания офлайн.",c4_h:"Радио",c4_p:"Тысячи станций со всего мира, любимые — в одно касание.",c5_h:"Резервная копия на Диске",c5_p:"Ваша музыка и плейлисты в безопасности на вашем Google Диске.",c6_h:"Сообщество",c6_p:"Профили, биографии и живая лента того, что слушают люди.",s3_eyebrow:"Поддержите проект",s3_title:"Бесплатно навсегда",s3_p:"В Cadence нет рекламы и платежей, и никогда не будет. Он живёт только благодаря тем, кто хочет, чтобы он существовал. Если нравится — угостите кофе.",cta_coffee:"Угостить кофе",cta_paypal:"Поддержать через PayPal",f_privacy:"Конфиденциальность",f_contact:"Контакты",f_support:"Поддержать"},
  zh:{_title:"Cadence — 你的音乐，自由",nav_home:"首页",nav_community:"社区",nav_music:"我的音乐",nav_radio:"电台",nav_free:"免费音乐",nav_download:"下载",nav_tailor:"定制",tagline:"你的音乐，自由。",thesis:"一款适用于 Android 的音乐、有声书、播客和电台播放器——免费、无广告，靠捐赠维持。现在也能在浏览器中使用。",cta_explore:"探索 Cadence",cta_community:"进入社区",s1_eyebrow:"简介",s1_title:"无障碍的音乐",s1_lead:"Cadence 播放你自己的音乐、有声书、播客和数千个电台。没有广告、不做追踪、不收费用。你的音乐保存在你自己的 Google Drive 中，Cadence 只负责播放——在手机或浏览器上。",x_eyebrow:"探索",x_title:"浏览器中的 Cadence",x1_h:"我的音乐",x1_p:"直接在浏览器中播放你自己 Google Drive 里的音乐。",x2_h:"地图电台",x2_p:"一张拥有数千个电台的世界地图。收听世界各地的广播。",x3_h:"社区",x3_p:"创建你的个人资料，实时发现与你口味相同的人在听什么。",x4_h:"定制音乐",x4_p:"时长正好等于你路程或休息时间的歌单。按时间或按 BPM。",x5_h:"免费音乐",x5_p:"发现并下载采用自由许可（知识共享）的音乐，合法且免费。",x_go:"打开 →",s2_eyebrow:"功能",s2_title:"一应俱全",c1_h:"音乐",c1_p:"你的音乐库，含歌单、均衡器、智能随机播放和淡入淡出。",c2_h:"有声书",c2_p:"从上次的位置继续，调整速度并设置睡眠定时。",c3_h:"播客",c3_p:"搜索、订阅并下载剧集，离线收听。",c4_h:"电台",c4_p:"来自全球的数千个电台，最爱的一触即达。",c5_h:"Drive 备份",c5_p:"你的音乐和歌单，安全地存放在你自己的 Google Drive 中。",c6_h:"社区",c6_p:"个人资料、简介，以及实时展示大家正在听什么的动态墙。",s3_eyebrow:"支持本项目",s3_title:"永久免费",s3_p:"Cadence 没有广告也不收费，永远如此。它仅靠希望它继续存在的人的帮助维持。如果你喜欢，可以请我们喝杯咖啡。",cta_coffee:"请喝咖啡",cta_paypal:"通过 PayPal 支持",f_privacy:"隐私",f_contact:"联系",f_support:"支持"},
  ja:{_title:"Cadence — あなたの音楽を自由に",nav_home:"ホーム",nav_community:"コミュニティ",nav_music:"マイミュージック",nav_radio:"ラジオ",nav_free:"フリー音楽",nav_download:"ダウンロード",nav_tailor:"ぴったり",tagline:"あなたの音楽を、自由に。",thesis:"Android 向けの音楽・オーディオブック・ポッドキャスト・ラジオプレーヤー。無料・広告なし・寄付で運営。そして今はブラウザでも。",cta_explore:"Cadence を見る",cta_community:"コミュニティに参加",s1_eyebrow:"概要",s1_title:"壁のない音楽",s1_lead:"Cadence はあなた自身の音楽、オーディオブック、ポッドキャスト、そして数千のラジオ局を再生します。広告なし、追跡なし、料金なし。音楽はあなた自身の Google ドライブに保存され、Cadence はそれを再生するだけ——スマホでもブラウザでも。",x_eyebrow:"見る",x_title:"ブラウザの Cadence",x1_h:"マイミュージック",x1_p:"自分の Google ドライブの音楽をブラウザで直接再生。",x2_h:"地図でラジオ",x2_p:"数千の放送局がある世界地図。どこの国のラジオも聴けます。",x3_h:"コミュニティ",x3_p:"プロフィールを作り、好みの近い人が今聴いているものをリアルタイムで発見。",x4_h:"ぴったり音楽",x4_p:"移動時間や休憩にちょうど合う長さのプレイリスト。時間または BPM で。",x5_h:"フリー音楽",x5_p:"自由ライセンス（クリエイティブ・コモンズ）の音楽を発見してダウンロード。合法・無料。",x_go:"開く →",s2_eyebrow:"できること",s2_title:"すべてを一つに",c1_h:"音楽",c1_p:"プレイリスト、イコライザー、スマートシャッフル、クロスフェードを備えたライブラリ。",c2_h:"オーディオブック",c2_p:"続きから再生、速度調整、スリープタイマー。",c3_h:"ポッドキャスト",c3_p:"検索・登録し、エピソードをダウンロードしてオフライン再生。",c4_h:"ラジオ",c4_p:"世界中の数千局、お気に入りはワンタップ。",c5_h:"Drive バックアップ",c5_p:"音楽とプレイリストをあなた自身の Google ドライブに安全に保存。",c6_h:"コミュニティ",c6_p:"プロフィール、自己紹介、そしてみんなが今聴いている内容のライブウォール。",s3_eyebrow:"プロジェクトを応援",s3_title:"ずっと無料",s3_p:"Cadence には広告も料金もなく、これからもありません。存在し続けてほしいという人々の支援だけで成り立っています。気に入ったら、コーヒーを一杯どうぞ。",cta_coffee:"コーヒーを贈る",cta_paypal:"PayPal で応援",f_privacy:"プライバシー",f_contact:"お問い合わせ",f_support:"応援する"},
  ar:{_title:"Cadence — موسيقاك، بحرّية",nav_home:"الرئيسية",nav_community:"المجتمع",nav_music:"موسيقاي",nav_radio:"الراديو",nav_free:"موسيقى حرة",nav_download:"تنزيل",nav_tailor:"على المقاس",tagline:"موسيقاك، بحرّية.",thesis:"مشغّل للموسيقى والكتب الصوتية والبودكاست والراديو لنظام أندرويد — مجاني، بلا إعلانات، ومدعوم بالتبرعات. والآن في متصفحك أيضاً.",cta_explore:"استكشف Cadence",cta_community:"ادخل إلى المجتمع",s1_eyebrow:"ما هو",s1_title:"موسيقى بلا حواجز",s1_lead:"يشغّل Cadence موسيقاك الخاصة وكتبك الصوتية وبودكاستك وآلاف محطات الراديو. بلا إعلانات، بلا تتبّع، بلا رسوم. تبقى موسيقاك في Google Drive الخاص بك، وما على Cadence إلا تشغيلها — على هاتفك أو في متصفحك.",x_eyebrow:"استكشف",x_title:"Cadence في متصفحك",x1_h:"موسيقاي",x1_p:"استمع إلى موسيقى Google Drive الخاصة بك مباشرة في المتصفح.",x2_h:"الراديو على الخريطة",x2_p:"خريطة عالمية بآلاف المحطات. استمع إلى الراديو من أي مكان.",x3_h:"المجتمع",x3_p:"أنشئ ملفك واكتشف ما يستمع إليه أصحاب ذوقك، في الوقت الحقيقي.",x4_h:"موسيقى على المقاس",x4_p:"قوائم تدوم تماماً بطول رحلتك أو استراحتك. حسب الوقت أو الإيقاع (BPM).",x5_h:"موسيقى حرة",x5_p:"اكتشف ونزّل موسيقى بترخيص حر (المشاع الإبداعي)، قانونية ومجانية.",x_go:"فتح →",s2_eyebrow:"ما يقدّمه",s2_title:"كل شيء في مكان واحد",c1_h:"الموسيقى",c1_p:"مكتبتك مع القوائم والمعادل والتشغيل العشوائي الذكي والتلاشي المتقاطع.",c2_h:"الكتب الصوتية",c2_p:"تابع من حيث توقفت، واضبط السرعة ومؤقّت النوم.",c3_h:"البودكاست",c3_p:"ابحث واشترك ونزّل الحلقات للاستماع دون اتصال.",c4_h:"الراديو",c4_p:"آلاف المحطات من العالم كله، ومفضّلاتك بلمسة واحدة.",c5_h:"نسخة على Drive",c5_p:"موسيقاك وقوائمك في أمان على Google Drive الخاص بك.",c6_h:"المجتمع",c6_p:"ملفات تعريف وسِيَر وجدار مباشر لما يستمع إليه الناس.",s3_eyebrow:"ادعم المشروع",s3_title:"مجاني إلى الأبد",s3_p:"لا يحتوي Cadence على إعلانات أو رسوم، ولن يحتوي أبداً. يعيش فقط بمساعدة من يريدون له أن يستمر. إن أعجبك، يمكنك تقديم فنجان قهوة.",cta_coffee:"اشترِ لنا قهوة",cta_paypal:"ادعم عبر PayPal",f_privacy:"الخصوصية",f_contact:"اتصل بنا",f_support:"ادعم"}
};
const RTL = ["ar"];
function setLang(lang){
  const d=I18N[lang]||I18N.es;
  document.documentElement.lang=lang;
  document.documentElement.dir = RTL.includes(lang) ? "rtl" : "ltr";
  document.title=d._title;
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n'); if(d[k]!==undefined) el.innerHTML=d[k];});
  document.getElementById('langsel').value=lang;
  try{ localStorage.setItem('cadence_lang',lang); }catch(e){}
}
document.getElementById('langsel').addEventListener('change',e=>setLang(e.target.value));
let saved=null; try{ saved=localStorage.getItem('cadence_lang'); }catch(e){}
const nav=(navigator.language||'es').toLowerCase().slice(0,2);
const auto=I18N[nav]?nav:'es';
setLang(saved||auto);
</script>
