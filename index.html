<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadence — Tu música, libre</title>
<link rel="icon" href="cadence-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0E1014; --surface:#16191F; --surface-2:#1E222B; --line:#2A2F3A;
    --accent:#7C9AFF; --accent-deep:#3A5BD0; --text:#E8EAF0; --muted:#9AA3B2;
    --display:"Fraunces",Georgia,serif; --body:"Inter",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--ink);color:var(--text);font-family:var(--body);
    line-height:1.65;-webkit-font-smoothing:antialiased}
  body::before{content:"";position:fixed;inset:0;z-index:-1;
    background:radial-gradient(1100px 560px at 50% -8%, rgba(124,154,255,.14), transparent 60%);}
  a{color:var(--accent);text-decoration:none}
  .container{max-width:1000px;margin:0 auto;padding:0 24px}

  /* Navegación */
  nav.top{position:sticky;top:0;z-index:30;background:rgba(14,16,20,.82);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .nav-inner{max-width:1000px;margin:0 auto;padding:12px 24px;display:flex;
    align-items:center;gap:18px}
  .nav-brand{display:flex;align-items:center;gap:10px;font-family:var(--display);
    font-size:1.2rem;font-weight:500}
  .nav-brand img{width:28px;height:28px}
  .nav-links{display:flex;gap:18px;margin-left:8px;flex-wrap:wrap}
  .nav-links a{color:var(--muted);font-size:.92rem;font-weight:500}
  .nav-links a:hover{color:var(--text)}
  .lang{display:flex;gap:4px;background:var(--surface);border:1px solid var(--line);
    border-radius:999px;padding:4px;margin-left:auto}
  .lang-btn{border:0;background:transparent;color:var(--muted);cursor:pointer;
    font-family:var(--body);font-size:.8rem;font-weight:600;letter-spacing:.04em;
    padding:5px 11px;border-radius:999px}
  .lang-btn.active{background:var(--accent);color:#0b0d12}

  /* Hero */
  .hero{text-align:center;padding:72px 0 56px}
  .hero img.logo{width:84px;height:84px;margin-bottom:18px}
  .wordmark{font-family:var(--display);font-weight:500;font-size:3.4rem;line-height:1}
  .tagline{color:var(--muted);font-size:1.05rem;margin-top:6px;letter-spacing:.02em}
  .thesis{max-width:620px;margin:24px auto 0;font-size:1.18rem;color:#cfd5e2}
  .cta-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:30px}
  .btn{display:inline-block;padding:12px 22px;border-radius:999px;font-weight:600;
    font-size:.98rem;cursor:pointer;border:1px solid transparent}
  .btn-primary{background:var(--accent);color:#0b0d12}
  .btn-primary:hover{background:#93acff}
  .btn-ghost{border-color:var(--line);color:var(--text)}
  .btn-ghost:hover{border-color:var(--accent)}

  section{padding:46px 0}
  .eyebrow{color:var(--accent);font-size:.8rem;letter-spacing:.14em;text-transform:uppercase;
    font-weight:600;margin-bottom:10px}
  h2{font-family:var(--display);font-weight:500;font-size:2rem;margin-bottom:14px}
  .lead{font-size:1.1rem;color:#cfd5e2;max-width:680px}

  /* Explora: tarjetas grandes que enlazan */
  .explore{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;margin-top:8px}
  .xcard{display:block;background:var(--surface);border:1px solid var(--line);border-radius:18px;
    padding:26px;transition:border-color .15s,transform .15s}
  .xcard:hover{border-color:var(--accent);transform:translateY(-2px)}
  .xcard .ic{font-size:1.8rem;margin-bottom:10px}
  .xcard h3{font-family:var(--display);font-weight:500;font-size:1.3rem;color:var(--text);margin-bottom:6px}
  .xcard p{color:var(--muted);font-size:.95rem}
  .xcard .go{color:var(--accent);font-size:.9rem;font-weight:600;margin-top:12px;display:inline-block}

  /* Features */
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-top:8px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px}
  .card h3{display:flex;align-items:center;gap:9px;font-family:var(--display);font-weight:500;
    font-size:1.12rem;margin-bottom:8px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
  .card p{color:var(--muted);font-size:.93rem}

  /* Apoyo */
  .support{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:36px}

  footer{border-top:1px solid var(--line);padding:30px 0;margin-top:30px}
  .foot-inner{display:flex;gap:20px;flex-wrap:wrap;align-items:center;color:var(--muted);font-size:.9rem}
  .foot-inner a{color:var(--muted)} .foot-inner a:hover{color:var(--text)}
  .foot-inner .sp{margin-left:auto}
</style>
</head>
<body>

<nav class="top">
  <div class="nav-inner">
    <span class="nav-brand"><img src="cadence-logo.png" alt="">Cadence</span>
    <div class="nav-links">
      <a href="index.html" data-i18n="nav_home"></a>
      <a href="app.html" data-i18n="nav_community"></a>
      <a href="musica.html" data-i18n="nav_music"></a>
      <a href="radio.html" data-i18n="nav_radio"></a>
      <a href="libre.html" data-i18n="nav_free"></a>
      <a href="descargar.html" data-i18n="nav_download"></a>
    </div>
    <div class="lang">
      <button class="lang-btn" data-lang="es">ES</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
  </div>
</nav>

<header class="hero">
  <div class="container">
    <img class="logo" src="cadence-logo.png" alt="Cadence">
    <h1 class="wordmark">Cadence</h1>
    <p class="tagline" data-i18n="tagline"></p>
    <p class="thesis" data-i18n="thesis"></p>
    <div class="cta-row">
      <a class="btn btn-primary" href="#explora" data-i18n="cta_explore"></a>
      <a class="btn btn-ghost" href="app.html" data-i18n="cta_community"></a>
    </div>
  </div>
</header>

<section id="que-es">
  <div class="container">
    <p class="eyebrow" data-i18n="s1_eyebrow"></p>
    <h2 data-i18n="s1_title"></h2>
    <p class="lead" data-i18n="s1_lead"></p>
  </div>
</section>

<!-- Explora: las partes de Cadence en la web -->
<section id="explora">
  <div class="container">
    <p class="eyebrow" data-i18n="x_eyebrow"></p>
    <h2 data-i18n="x_title"></h2>
    <div class="explore">
      <a class="xcard" href="musica.html">
        <div class="ic">🎵</div>

        <p data-i18n="x1_p"></p>
        <span class="go" data-i18n="x_go"></span>
      </a>
      <a class="xcard" href="radio.html">
        <div class="ic">🌍</div>
        <h3 data-i18n="x2_h"></h3>
        <p data-i18n="x2_p"></p>
        <span class="go" data-i18n="x_go"></span>
      </a>
      <a class="xcard" href="app.html">
        <div class="ic">👥</div>
        <h3 data-i18n="x3_h"></h3>
        <p data-i18n="x3_p"></p>
        <span class="go" data-i18n="x_go"></span>
      </a>
      <a class="xcard" href="medida.html">
        <div class="ic">⏱️</div>
        <h3 data-i18n="x4_h"></h3>
        <p data-i18n="x4_p"></p>
        <span class="go" data-i18n="x_go"></span>
      </a>
      <a class="xcard" href="libre.html">
        <div class="ic">🎁</div>
        <h3 data-i18n="x5_h"></h3>
        <p data-i18n="x5_p"></p>
        <span class="go" data-i18n="x_go"></span>
      </a>
    </div>
  </div>
</section>

<!-- Qué ofrece -->
<section>
  <div class="container">
    <p class="eyebrow" data-i18n="s2_eyebrow"></p>
    <h2 data-i18n="s2_title"></h2>
    <div class="grid">
      <div class="card"><h3><span class="dot"></span><span data-i18n="c1_h"></span></h3><p data-i18n="c1_p"></p></div>
      <div class="card"><h3><span class="dot"></span><span data-i18n="c2_h"></span></h3><p data-i18n="c2_p"></p></div>
      <div class="card"><h3><span class="dot"></span><span data-i18n="c3_h"></span></h3><p data-i18n="c3_p"></p></div>
      <div class="card"><h3><span class="dot"></span><span data-i18n="c4_h"></span></h3><p data-i18n="c4_p"></p></div>
      <div class="card"><h3><span class="dot"></span><span data-i18n="c5_h"></span></h3><p data-i18n="c5_p"></p></div>
      <div class="card"><h3><span class="dot"></span><span data-i18n="c6_h"></span></h3><p data-i18n="c6_p"></p></div>
    </div>
  </div>
</section>

<!-- Apoyo -->
<section>
  <div class="container">
    <div class="support">
      <p class="eyebrow" data-i18n="s3_eyebrow"></p>
      <h2 data-i18n="s3_title"></h2>
      <p class="lead" data-i18n="s3_p"></p>
      <div class="cta-row" style="justify-content:flex-start;margin-top:22px">
        <a class="btn btn-primary" href="https://buymeacoffee.com/jsgaston" data-i18n="cta_coffee"></a>
        <a class="btn btn-ghost" href="https://paypal.me/javigastoniriarte" data-i18n="cta_paypal"></a>
      </div>
    </div>
  </div>
</section>

<footer>
  <div class="container foot-inner">
    <span>© 2026 Cadence · Javier Gastón Cabrera</span>
    <a href="privacy.html" data-i18n="f_privacy"></a>
    <a href="mailto:jsgastoniriartecabrera@gmail.com" data-i18n="f_contact"></a>
    <a class="sp" href="https://buymeacoffee.com/jsgaston" data-i18n="f_support"></a>
  </div>
</footer>

<script>
const I18N = {
  es: {
    _title:"Cadence — Tu música, libre",
    nav_home:"Inicio", nav_community:"Comunidad", nav_music:"Mi música", nav_radio:"Radio", nav_free:"Libre", nav_download:"Descargar", nav_privacy:"Privacidad",
    tagline:"Tu música, libre.",
    thesis:"Un reproductor de música, audiolibros, podcasts y radio para Android — gratuito, sin anuncios y sostenido por donaciones. Y ahora también en tu navegador.",
    cta_explore:"Explorar Cadence", cta_community:"Entrar a la comunidad",
    s1_eyebrow:"Qué es", s1_title:"Música sin barreras",
    s1_lead:"Cadence reproduce tu propia música, tus audiolibros, tus podcasts y miles de emisoras de radio. Sin anuncios, sin rastreo, sin cuotas. Tú eres el dueño de tu biblioteca: tu música vive en tu propio Google Drive, y Cadence solo la reproduce — en el móvil o en el navegador.",
    x_eyebrow:"Explora", x_title:"Cadence en tu navegador",
    x1_h:"Mi música", x1_p:"Escucha la música de tu propio Google Drive directamente en el navegador, estés donde estés.",
    x2_h:"Radio en el mapa", x2_p:"Un mapamundi con miles de emisoras. Viaja por el mundo y escucha la radio de cualquier lugar.",
    x3_h:"Comunidad", x3_p:"Crea tu perfil de oyente y descubre qué escucha la gente con tus mismos gustos, en tiempo real.",
    x4_h:"Música a medida", x4_p:"Listas que duran justo lo que tu trayecto o tu rato. Por mapa, minutos o BPM.",
    x5_h:"Música libre", x5_p:"Descubre y descarga música con licencia libre (Creative Commons), legal y gratis.",
    x_go:"Abrir →",
    s2_eyebrow:"Qué ofrece", s2_title:"Todo en uno",
    c1_h:"Música", c1_p:"Tu biblioteca con listas, ecualizador, mezcla inteligente y crossfade.",
    c2_h:"Audiolibros", c2_p:"Retoma donde lo dejaste, ajusta la velocidad y pon temporizador.",
    c3_h:"Podcasts", c3_p:"Busca, suscríbete y descarga episodios para escuchar sin conexión.",
    c4_h:"Radio", c4_p:"Miles de emisoras de todo el mundo, con tus favoritas a un toque.",
    c5_h:"Respaldo en Drive", c5_p:"Tu música y tus listas, a salvo en tu propio Google Drive.",
    c6_h:"Comunidad", c6_p:"Perfiles, biografías y un muro en vivo de lo que escucha la gente.",
    s3_eyebrow:"Apoya el proyecto", s3_title:"Gratis para siempre",
    s3_p:"Cadence no tiene anuncios ni cuotas, y nunca los tendrá. Se sostiene solo con la ayuda de quien quiere que siga existiendo. Si te gusta, puedes invitar a un café.",
    cta_coffee:"Invitar a un café", cta_paypal:"Apoyar por PayPal",
    f_privacy:"Privacidad", f_contact:"Contacto", f_support:"Apoyar"
  },
  en: {
    _title:"Cadence — Your music, free",
    nav_home:"Home", nav_community:"Community", nav_music:"My music", nav_radio:"Radio", nav_free:"Free", nav_download:"Download", nav_privacy:"Privacy",
    tagline:"Your music, free.",
    thesis:"A music, audiobook, podcast and radio player for Android — free, ad-free and donation-supported. And now in your browser too.",
    cta_explore:"Explore Cadence", cta_community:"Enter the community",
    s1_eyebrow:"What it is", s1_title:"Music without barriers",
    s1_lead:"Cadence plays your own music, your audiobooks, your podcasts and thousands of radio stations. No ads, no tracking, no fees. You own your library: your music lives in your own Google Drive, and Cadence just plays it — on your phone or in your browser.",
    x_eyebrow:"Explore", x_title:"Cadence in your browser",
    x1_h:"My music", x1_p:"Play the music from your own Google Drive right in your browser, wherever you are.",
    x2_h:"Radio on the map", x2_p:"A world map with thousands of stations. Travel the globe and tune into radio anywhere.",
    x3_h:"Community", x3_p:"Create your listener profile and discover what people with your taste are playing, in real time.",
    x4_h:"Made to measure", x4_p:"Playlists that last exactly your trip or your break. By map, minutes or BPM.",
    x5_h:"Free music", x5_p:"Discover and download Creative-Commons licensed music, legal and free.",
    x_go:"Open →",
    s2_eyebrow:"What it offers", s2_title:"All in one",
    c1_h:"Music", c1_p:"Your library with playlists, equalizer, smart shuffle and crossfade.",
    c2_h:"Audiobooks", c2_p:"Resume where you left off, adjust speed and set a sleep timer.",
    c3_h:"Podcasts", c3_p:"Search, subscribe and download episodes for offline listening.",
    c4_h:"Radio", c4_p:"Thousands of stations worldwide, with your favorites one tap away.",
    c5_h:"Drive backup", c5_p:"Your music and playlists, safe in your own Google Drive.",
    c6_h:"Community", c6_p:"Profiles, bios and a live wall of what people are listening to.",
    s3_eyebrow:"Support the project", s3_title:"Free forever",
    s3_p:"Cadence has no ads and no fees, and never will. It survives only through the help of those who want it to keep existing. If you like it, you can buy a coffee.",
    cta_coffee:"Buy a coffee", cta_paypal:"Support via PayPal",
    f_privacy:"Privacy", f_contact:"Contact", f_support:"Support"
  }
};
function setLang(lang){
  const d=I18N[lang]||I18N.es;
  document.documentElement.lang=lang; document.title=d._title;
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n'); if(d[k]!==undefined) el.innerHTML=d[k];});
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));
  try{ localStorage.setItem('cadence_lang',lang); }catch(e){}
}
document.querySelectorAll('.lang-btn').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));
let saved=null; try{ saved=localStorage.getItem('cadence_lang'); }catch(e){}
const auto=(navigator.language||'es').toLowerCase().startsWith('en')?'en':'es';
setLang(saved||auto);
</script>
</body>
</html>
