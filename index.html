<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadence — tu música, sin anuncios</title>
<meta name="description" content="Cadence: reproductor de música, audiolibros, podcasts y radio para Android. Gratis, sin anuncios. El respaldo va a tu propio Google Drive.">
<link rel="icon" href="cadence-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0E1014; --surface:#16191F; --surface-2:#1E222B; --line:#2A2F3A;
    --accent:#7C9AFF; --accent-deep:#3A5BD0; --text:#E8EAF0; --muted:#9AA3B2;
    --display:"Fraunces",Georgia,serif; --body:"Inter",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--ink);color:var(--text);font-family:var(--body);
    line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{max-width:960px;margin:0 auto;padding:0 24px}
  body::before{content:"";position:fixed;inset:0;z-index:-1;
    background:radial-gradient(1200px 600px at 50% -10%, rgba(124,154,255,.14), transparent 60%);}

  /* selector de idioma */
  .lang{position:fixed;top:16px;right:16px;z-index:20;display:flex;gap:4px;
    background:rgba(22,25,31,.8);backdrop-filter:blur(8px);
    border:1px solid var(--line);border-radius:999px;padding:4px}
  .lang-btn{border:0;background:transparent;color:var(--muted);cursor:pointer;
    font-family:var(--body);font-size:.82rem;font-weight:600;letter-spacing:.04em;
    padding:5px 11px;border-radius:999px}
  .lang-btn.active{background:var(--accent);color:#0b0d12}

  header.hero{text-align:center;padding:96px 24px 64px}
  .logo{width:76px;height:76px;object-fit:contain;
    filter:drop-shadow(0 6px 24px rgba(124,154,255,.35))}
  .wordmark{font-family:var(--display);font-weight:500;font-size:clamp(3rem,9vw,5.5rem);
    letter-spacing:-.02em;line-height:1;margin:18px 0 0}
  .thesis{font-size:clamp(1.05rem,2.6vw,1.3rem);color:var(--muted);
    max-width:34ch;margin:18px auto 0}
  .accent-word{color:var(--accent)}

  .wave{display:flex;align-items:flex-end;justify-content:center;gap:5px;
    height:54px;margin:34px auto 8px}
  .wave span{width:5px;height:100%;border-radius:3px;transform-origin:bottom;
    background:linear-gradient(var(--accent),var(--accent-deep));
    transform:scaleY(.25);animation:beat 1.4s ease-in-out infinite}
  .wave span:nth-child(1){animation-delay:-1.0s}
  .wave span:nth-child(2){animation-delay:-.2s}
  .wave span:nth-child(3){animation-delay:-.7s}
  .wave span:nth-child(4){animation-delay:-.4s}
  .wave span:nth-child(5){animation-delay:-1.2s}
  .wave span:nth-child(6){animation-delay:-.1s}
  .wave span:nth-child(7){animation-delay:-.9s}
  .wave span:nth-child(8){animation-delay:-.5s}
  .wave span:nth-child(9){animation-delay:-1.1s}
  .wave span:nth-child(10){animation-delay:-.3s}
  .wave span:nth-child(11){animation-delay:-.8s}
  @keyframes beat{0%,100%{transform:scaleY(.22)}50%{transform:scaleY(1)}}

  .cta{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:30px}
  .btn{display:inline-block;padding:12px 22px;border-radius:999px;font-weight:500}
  .btn-primary{background:var(--accent);color:#0b0d12}
  .btn-primary:hover{background:#93acff;text-decoration:none}
  .btn-ghost{border:1px solid var(--line);color:var(--text)}
  .btn-ghost:hover{border-color:var(--accent);text-decoration:none}

  section{padding:56px 0}
  .eyebrow{font-size:.78rem;letter-spacing:.18em;text-transform:uppercase;
    color:var(--accent);font-weight:600;margin-bottom:14px}
  h2{font-family:var(--display);font-weight:500;font-size:clamp(1.7rem,4vw,2.4rem);
    letter-spacing:-.01em;margin-bottom:16px}
  p.lead{color:var(--muted);max-width:62ch;font-size:1.08rem}

  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:16px;margin-top:32px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:24px}
  .card h3{font-size:1.05rem;font-weight:600;margin-bottom:8px}
  .card p{color:var(--muted);font-size:.96rem}
  .card .dot{display:inline-block;width:9px;height:9px;border-radius:50%;
    background:var(--accent);margin-right:8px;vertical-align:middle}

  .ethos{background:var(--surface);border:1px solid var(--line);border-radius:20px;
    padding:40px;text-align:center;margin-top:8px}
  .ethos h2{margin-bottom:12px}
  .ethos p{color:var(--muted);max-width:56ch;margin:0 auto}

  footer{border-top:1px solid var(--line);padding:40px 0 64px;margin-top:40px;
    color:var(--muted);font-size:.92rem}
  .foot-row{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;align-items:center}
  .foot-links{display:flex;gap:20px;flex-wrap:wrap}

  @media (prefers-reduced-motion: reduce){
    .wave span{animation:none;transform:scaleY(.6)}
    html{scroll-behavior:auto}
  }
</style>
</head>
<body>

<nav class="lang" aria-label="Idioma / Language">
  <button class="lang-btn" data-lang="es">ES</button>
  <button class="lang-btn" data-lang="en">EN</button>
</nav>

<header class="hero">
  <div class="wrap">
    <img class="logo" src="cadence-logo.png" alt="Cadence">
    <h1 class="wordmark">Cadence</h1>
    <div class="wave" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <p class="thesis" data-i18n="thesis"></p>
    <div class="cta">
      <a class="btn btn-primary" href="#que-es" data-i18n="cta_discover"></a>
      <a class="btn btn-ghost" href="privacy.html" data-i18n="cta_privacy"></a>
    </div>
  </div>
</header>

<section id="que-es">
  <div class="wrap">
    <p class="eyebrow" data-i18n="s1_eyebrow"></p>
    <h2 data-i18n="s1_title"></h2>
    <p class="lead" data-i18n="s1_lead"></p>
  </div>
</section>

<section>
  <div class="wrap">
    <p class="eyebrow" data-i18n="s2_eyebrow"></p>
    <h2 data-i18n="s2_title"></h2>
    <div class="grid">
      <div class="card"><h3><span class="dot"></span><span data-i18n="c1_h"></span></h3><p data-i18n="c1_p"></p></div>
      <div class="card"><h3><span class="dot"></span><span data-i18n="c2_h"></span></h3><p data-i18n="c2_p"></p></div>
      <div class="card"><h3><span class="dot"></span><span data-i18n="c3_h"></span></h3><p data-i18n="c3_p"></p></div>
      <div class="card"><h3><span class="dot"></span><span data-i18n="c4_h"></span></h3><p data-i18n="c4_p"></p></div>
      <div class="card"><h3><span class="dot"></span><span data-i18n="c5_h"></span></h3><p data-i18n="c5_p"></p></div>
      <div class="card"><h3><span class="dot"></span><span data-i18n="c6_h"></span></h3><p data-i18n="c6_p"></p></div>
    </div>
  </div>
</section>

<section>
  <div class="wrap">
    <div class="ethos">
      <p class="eyebrow" data-i18n="s3_eyebrow"></p>
      <h2 data-i18n="s3_title"></h2>
      <p data-i18n="s3_p"></p>
      <div class="cta">
        <a class="btn btn-primary" href="https://buymeacoffee.com/jsgaston" data-i18n="cta_coffee"></a>
        <a class="btn btn-ghost" href="https://paypal.me/javigastoniriarte" data-i18n="cta_paypal"></a>
      </div>
    </div>
  </div>
</section>

<footer>
  <div class="wrap foot-row">
    <div>© <span id="y"></span> Cadence · Javier Gastón Cabrera</div>
    <div class="foot-links">
      <a href="privacy.html" data-i18n="f_privacy"></a>
      <a href="mailto:jsgastoniriartecabrera@gmail.com" data-i18n="f_contact"></a>
      <a href="https://buymeacoffee.com/jsgaston" data-i18n="f_support"></a>
    </div>
  </div>
</footer>

function setLang(lang){
  const dict = I18N[lang] || I18N.es;
  document.documentElement.lang = lang;
  document.title = dict._title;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k = el.getAttribute('data-i18n');
    if(dict[k] !== undefined) el.innerHTML = dict[k];
  });
  document.querySelectorAll('.lang-btn').forEach(b=>
    b.classList.toggle('active', b.dataset.lang === lang));
  try{ localStorage.setItem('cadence_lang', lang); }catch(e){}
}

document.querySelectorAll('.lang-btn').forEach(b=>
  b.addEventListener('click', ()=>setLang(b.dataset.lang)));

let saved=null; try{ saved=localStorage.getItem('cadence_lang'); }catch(e){}
const auto=(navigator.language||'es').toLowerCase().startsWith('en')?'en':'es';
setLang(saved || auto);
document.getElementById('y').textContent=new Date().getFullYear();
</script>
</body>
</html>
