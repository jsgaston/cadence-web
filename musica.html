<style>
  :root{
    --ink:#0E1014; --surface:#16191F; --surface-2:#1E222B; --line:#2A2F3A;
    --accent:#7C9AFF; --accent-deep:#3A5BD0; --text:#E8EAF0; --muted:#9AA3B2;
    --display:"Fraunces",Georgia,serif; --body:"Inter",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--ink);color:var(--text);font-family:var(--body);
    line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
  body::before{content:"";position:fixed;inset:0;z-index:-1;
    background:radial-gradient(1000px 500px at 50% -10%, rgba(124,154,255,.14), transparent 60%);}
  a{color:var(--accent);text-decoration:none}
  .langsel{background:var(--surface);border:1px solid var(--line);color:var(--text);border-radius:999px;padding:6px 11px;font-family:var(--body);font-size:.82rem;cursor:pointer}
  .langsel:focus{outline:none;border-color:var(--accent)}
  html[lang="zh"] body{font-family:"Noto Sans SC","Inter",sans-serif}
  html[lang="ja"] body{font-family:"Noto Sans JP","Inter",sans-serif}
  html[lang="ar"] body{font-family:"Noto Sans Arabic","Inter",sans-serif}
  .topbar{position:fixed;top:16px;left:0;right:0;display:flex;justify-content:space-between;
    align-items:center;padding:0 20px;z-index:20}
  .back{font-size:.9rem;color:var(--muted)}
  .wrap{max-width:640px;margin:0 auto;padding:72px 24px 130px}
  .brand{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:6px}
  .brand img{width:44px;height:44px;object-fit:contain}
  .brand h1{font-family:var(--display);font-weight:500;font-size:1.8rem}
  .sub{text-align:center;color:var(--muted);margin-bottom:32px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:28px}
  .gbtn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;
    padding:13px 18px;border-radius:999px;border:0;cursor:pointer;
    background:var(--accent);color:#0b0d12;font-family:var(--body);font-weight:600;font-size:1rem}
  .gbtn:hover{background:#93acff}
  .status{min-height:20px;margin-top:14px;font-size:.9rem;color:var(--muted);text-align:center}
  .artist{font-family:var(--display);font-size:1.2rem;font-weight:500;margin:22px 0 4px}
  .album{color:var(--accent);font-size:.8rem;letter-spacing:.06em;text-transform:uppercase;margin:14px 0 6px}
  .track{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:8px;
    border-bottom:1px solid rgba(42,47,58,.5);font-size:.95rem;cursor:pointer}
  .track:hover{background:var(--surface-2)}
  .track.playing{color:var(--accent)}
  .track .dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0}
  .track.playing .dot{background:var(--accent)}
  .addbtn{margin-left:auto;background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:8px;width:28px;height:28px;cursor:pointer;flex-shrink:0;font-size:1rem;line-height:1}
  .addbtn:hover{border-color:var(--accent);color:var(--accent)}
  .plbtn{background:var(--surface-2);border:1px solid var(--line);color:var(--text);border-radius:999px;padding:7px 14px;cursor:pointer;font-family:var(--body);font-size:.85rem}
  .plbtn:hover{border-color:var(--accent)}
  .ploverlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .ploverlay.show{display:flex}
  .plpanel{background:var(--surface);border:1px solid var(--line);border-radius:16px;max-width:420px;width:100%;max-height:72vh;overflow:auto;padding:18px}
  .plhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;font-family:var(--display);font-size:1.15rem}
  .plx{background:none;border:0;color:var(--muted);font-size:1.2rem;cursor:pointer}
  .plrow{display:flex;align-items:center;gap:10px;padding:11px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px}
  .plrow .nm{flex:1;cursor:pointer}.plrow .nm:hover{color:var(--accent)}
  .plrow .cnt{font-size:.78rem;color:var(--muted)}
  .plrow .del{background:none;border:0;color:var(--muted);cursor:pointer;font-size:1rem}
  .plrow .del:hover{color:#ff8a8a}
  .plempty{color:var(--muted);font-size:.9rem;text-align:center;padding:10px}
  .empty{color:var(--muted);text-align:center;padding:20px 0}

  /* Barra de reproducción */
  .player{position:fixed;left:0;right:0;bottom:0;background:rgba(22,25,31,.96);
    backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:12px 20px;
    display:none;z-index:30}
  .player.show{display:block}
  .player-inner{max-width:640px;margin:0 auto;display:flex;align-items:center;gap:16px}
  .pinfo{flex:1;min-width:0}
  .ptitle{font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pstate{font-size:.78rem;color:var(--muted)}
  .pcontrols{display:flex;align-items:center;gap:6px}
  .pbtn{width:40px;height:40px;border-radius:50%;border:0;cursor:pointer;
    background:transparent;color:var(--text);font-size:1.1rem;display:flex;
    align-items:center;justify-content:center}
  .pbtn:hover{background:var(--surface-2)}
  .pbtn.main{background:var(--accent);color:#0b0d12;width:46px;height:46px}
  .pbtn.repeaton{color:var(--accent);background:rgba(124,154,255,.20);box-shadow:0 0 0 1px var(--accent) inset}
  .seekrow{max-width:640px;margin:7px auto 0;display:flex;align-items:center;gap:10px}
  .seekrow span{font-size:.72rem;color:var(--muted);min-width:36px;text-align:center}
  .seekrow input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:var(--surface-2);cursor:pointer}
  .seekrow input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:13px;height:13px;border-radius:50%;background:var(--accent);cursor:pointer}
  .seekrow input[type=range]::-moz-range-thumb{width:13px;height:13px;border:0;border-radius:50%;background:var(--accent);cursor:pointer}

</style>

<script>
const CLIENT_ID = "995587221821-8cbi515dqobdcsktbodk864q7obl255r.apps.googleusercontent.com";
const SCOPE = "https://www.googleapis.com/auth/drive.file";

let tokenClient = null, accessToken = null;
let queue = [];      // {id, name, label}
let current = -1;

const statusEl = () => document.getElementById("status");
const listEl = () => document.getElementById("list");
const audio = document.getElementById("audio");
function setStatus(m){ statusEl().textContent = m; }

window.onload = () => {
  const wait = setInterval(() => {
    if (window.google && google.accounts && google.accounts.oauth2) {
      clearInterval(wait);
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID, scope: SCOPE,
        callback: (resp) => {
          if (resp.error) { setStatus(t("noconn") + resp.error); return; }
          accessToken = resp.access_token;
          document.getElementById("connectBox").style.display = "none";
          loadMusic();
        }
      });
    }
  }, 200);
};

document.getElementById("connectBtn").addEventListener("click", () => {
  if (!tokenClient) { setStatus(t("gload")); return; }
  setStatus(""); tokenClient.requestAccessToken();
});

async function drive(path){
  const res = await fetch("https://www.googleapis.com/drive/v3/" + path, {
    headers: { Authorization: "Bearer " + accessToken }
  });
  if (!res.ok) throw new Error("Drive " + res.status);
  return res.json();
}
// Devuelve TODAS las carpetas que coincidan con el nombre (no solo la primera),
// comparando sin acentos ni mayúsculas para tolerar "Musica"/"Música", etc.
function norm(s){ return (s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim().toLowerCase(); }
async function findFolders(name, parentId){
  let q = "mimeType='application/vnd.google-apps.folder' and trashed=false";
  if (parentId) q += " and '" + parentId + "' in parents";
  // Traemos todas las subcarpetas y filtramos por nombre normalizado.
  let out = [], pageToken = null;
  do {
    let url = "files?q=" + encodeURIComponent(q) + "&fields=nextPageToken,files(id,name)&pageSize=1000";
    if (pageToken) url += "&pageToken=" + pageToken;
    const r = await drive(url);
    if (r.files) out = out.concat(r.files);
    pageToken = r.nextPageToken || null;
  } while (pageToken);
  const target = norm(name);
  return out.filter(f => norm(f.name) === target).map(f => f.id);
}
async function findFolder(name, parentId){
  const ids = await findFolders(name, parentId);
  return ids.length ? ids[0] : null;
}
async function listChildren(parentId, foldersOnly){
  let q = "'" + parentId + "' in parents and trashed=false";
  if (foldersOnly) q += " and mimeType='application/vnd.google-apps.folder'";
  let out = [], pageToken = null;
  do {
    let url = "files?q=" + encodeURIComponent(q) +
      "&fields=nextPageToken,files(id,name,mimeType)&orderBy=name&pageSize=1000";
    if (pageToken) url += "&pageToken=" + pageToken;
    const r = await drive(url);
    if (r.files) out = out.concat(r.files);
    pageToken = r.nextPageToken || null;
  } while (pageToken);
  return out;
}

async function loadMusic(){
  setStatus(t("searching"));
  listEl().innerHTML = ""; queue = [];
  window._extCount = {};
  try {
    // 1) TODAS las carpetas "Cadence" (puede haber duplicadas).
    const cadenceIds = await findFolders("Cadence", null);
    if (!cadenceIds.length) return setStatus(t("nofolder"));
    // 2) TODAS las "Música" dentro de cada "Cadence".
    let musicIds = [];
    for (const cid of cadenceIds) musicIds = musicIds.concat(await findFolders("Música", cid));
    if (!musicIds.length) return setStatus(t("nomusic"));

    // 3) Recorremos todas las "Música" y agrupamos artistas por nombre,
    //    aunque estén en carpetas distintas/duplicadas.
    const artistFolders = {}; // nombre normalizado -> {name, ids:[]}
    for (const mid of musicIds) {
      for (const a of await listChildren(mid, true)) {
        const k = norm(a.name);
        (artistFolders[k] = artistFolders[k] || { name: a.name, ids: [] }).ids.push(a.id);
      }
    }
    const artistKeys = Object.keys(artistFolders).sort((x, y) => artistFolders[x].name.localeCompare(artistFolders[y].name));
    if (!artistKeys.length) { listEl().innerHTML = '<p class="empty">'+t('empty')+'</p>'; return setStatus(""); }

    for (const ak of artistKeys) {
      const artist = artistFolders[ak];
      const aEl = document.createElement("div");
      aEl.innerHTML = '<div class="artist">' + esc(artist.name) + '</div>';
      listEl().appendChild(aEl);

      // Álbumes de ese artista, agrupados por nombre (de todas sus carpetas).
      const albumFolders = {};
      for (const aid of artist.ids) {
        for (const al of await listChildren(aid, true)) {
          const k = norm(al.name);
          (albumFolders[k] = albumFolders[k] || { name: al.name, ids: [] }).ids.push(al.id);
        }
      }
      for (const alk of Object.keys(albumFolders)) {
        const album = albumFolders[alk];
        const alEl = document.createElement("div");
        alEl.innerHTML = '<div class="album">' + esc(album.name) + '</div>';
        listEl().appendChild(alEl);

        // Todos los archivos del álbum (de todas sus carpetas), sin ocultar formatos.
        let rawFiles = [];
        for (const alid of album.ids) {
          rawFiles = rawFiles.concat((await listChildren(alid, false))
            .filter(f => f.mimeType !== "application/vnd.google-apps.folder"));
        }
        // Quitamos archivos repetidos exactos (mismo nombre) por si una carpeta sale dos veces.
        const byName = {}; rawFiles.forEach(f => { byName[f.name] = f; });
        rawFiles = Object.values(byName);

        rawFiles.forEach(f => { const e = (f.name.split('.').pop() || '?').toLowerCase(); window._extCount[e] = (window._extCount[e] || 0) + 1; });
        // Ordenamos por nombre y MOSTRAMOS TODO (mp3 y m4a).
        rawFiles.sort((x, y) => x.name.localeCompare(y.name));
        rawFiles.forEach(t => {
          const fmt = (t.name.split('.').pop() || '').toLowerCase();
          const label = cleanName(t.name) + " — " + artist.name;
          const idx = queue.length;
          queue.push({ id: t.id, name: cleanName(t.name), file: t.name, label });
          const row = document.createElement("div");
          row.className = "track"; row.dataset.idx = idx;
          row.innerHTML = '<span class="dot"></span><span>' + esc(cleanName(t.name)) +
            '</span><span style="font-size:.7rem;color:var(--muted);margin-left:6px">' + esc(fmt) + '</span>' +
            '<button class="addbtn" title="Añadir a lista">＋</button>';
          row.addEventListener("click", () => playIndex(idx));
          row.querySelector(".addbtn").addEventListener("click", (e) => {
            e.stopPropagation();
            addToPlaylist({ id: t.id, name: cleanName(t.name), file: t.name, label });
          });
          listEl().appendChild(row);
        });
      }
    }
    const desglose = Object.entries(window._extCount).map(([e, n]) => n + " " + e).join(", ");
    setStatus(queue.length + t("count") + (desglose ? "  ·  En Drive: " + desglose : ""));
    document.getElementById("plBar").style.display = "flex";
  } catch (e) { setStatus(t("err") + e.message); }
}

async function playIndex(idx){
  if (idx < 0 || idx >= queue.length) return;
  current = idx;
  const track = queue[idx];
  highlight();
  document.getElementById("player").classList.add("show");
  document.getElementById("pTitle").textContent = track.name;
  document.getElementById("pState").textContent = "Cargando...";
  try {
    // Descarga el audio de Drive con el token y lo reproduce.
    const res = await fetch("https://www.googleapis.com/drive/v3/files/" + track.id + "?alt=media", {
      headers: { Authorization: "Bearer " + accessToken }
    });
    if (!res.ok) throw new Error("Drive " + res.status);
    let blob = await res.blob();
    // Le decimos al navegador qué tipo de audio es (Drive a veces no lo indica),
    // para que reproduzca bien el m4a, mp3, etc.
    const fname = (track.file || track.name || "").toLowerCase();
    let mime = "";
    if (/\.(m4a|m4b|aac|mp4)$/.test(fname)) mime = "audio/mp4";
    else if (/\.mp3$/.test(fname)) mime = "audio/mpeg";
    else if (/\.ogg$/.test(fname)) mime = "audio/ogg";
    else if (/\.flac$/.test(fname)) mime = "audio/flac";
    else if (/\.wav$/.test(fname)) mime = "audio/wav";
    if (mime && blob.type !== mime) blob = blob.slice(0, blob.size, mime);
    audio.src = URL.createObjectURL(blob);
    await audio.play();
    document.getElementById("pState").textContent = "Reproduciendo";
    document.getElementById("playBtn").textContent = "⏸";
    if (window.reportToWall) window.reportToWall(track.label);
  } catch (e) {
    const isM4a = /\.(m4a|m4b|aac)$/.test((track.file || track.name || "").toLowerCase());
    document.getElementById("pState").textContent = isM4a
      ? "Este navegador no pudo reproducir el m4a (prueba en Chrome o Safari)."
      : "Error: " + e.message;
  }
}
// ---- Mis listas (guardadas en este navegador) ----
function highlight(){
  document.querySelectorAll(".track").forEach(r =>
    r.classList.toggle("playing", Number(r.dataset.idx) === current));
}
function plGet(){ try{ return JSON.parse(localStorage.getItem("cadence_playlists")||"{}"); }catch(e){ return {}; } }
function plSet(o){ try{ localStorage.setItem("cadence_playlists", JSON.stringify(o)); }catch(e){} }

function addToPlaylist(track){
  const lists = plGet();
  const names = Object.keys(lists);
  let name = prompt(
    "¿A qué lista? Escribe un nombre nuevo o uno de los que ya tienes:" +
    (names.length ? "\n\nTus listas: " + names.join(", ") : ""),
    names[0] || "Mi lista"
  );
  if (name == null) return;
  name = name.trim(); if (!name) return;
  if (!lists[name]) lists[name] = [];
  if (lists[name].some(x => x.id === track.id)) { alert("Esa canción ya está en «" + name + "»."); return; }
  lists[name].push({ id: track.id, name: track.name, label: track.label });
  plSet(lists);
  alert("Añadida a «" + name + "» (" + lists[name].length + " canciones).");
}

function openPlaylists(){
  const lists = plGet();
  const box = document.getElementById("plListBox");
  box.innerHTML = "";
  const names = Object.keys(lists);
  if (!names.length){ box.innerHTML = '<div class="plempty">Aún no tienes listas. Pulsa el ＋ de una canción para crear una.</div>'; }
  names.forEach(name => {
    const row = document.createElement("div"); row.className = "plrow";
    row.innerHTML = '<span class="nm">▶ ' + esc(name) + '</span><span class="cnt">' +
      lists[name].length + '</span><button class="del" title="Borrar lista">🗑</button>';
    row.querySelector(".nm").addEventListener("click", () => { playPlaylist(name); closePlaylists(); });
    row.querySelector(".del").addEventListener("click", () => {
      if (confirm("¿Borrar la lista «" + name + "»?")) { const l = plGet(); delete l[name]; plSet(l); openPlaylists(); }
    });
    box.appendChild(row);
  });
  document.getElementById("plOverlay").classList.add("show");
}
function closePlaylists(){ document.getElementById("plOverlay").classList.remove("show"); }

function playPlaylist(name){
  const lists = plGet();
  const items = lists[name] || [];
  if (!items.length) return;
  queue = items.map(x => ({ id: x.id, name: x.name, file: x.file || x.name, label: x.label }));
  // Pinta la lista en pantalla
  listEl().innerHTML = '<div class="album">♫ ' + esc(name) + '</div>';
  queue.forEach((tr, idx) => {
    const row = document.createElement("div");
    row.className = "track"; row.dataset.idx = idx;
    row.innerHTML = '<span class="dot"></span><span>' + esc(tr.name) + '</span>';
    row.addEventListener("click", () => playIndex(idx));
    listEl().appendChild(row);
  });
  setStatus(queue.length + t("count"));
  playIndex(0);
}

document.getElementById("plBtn").addEventListener("click", openPlaylists);
document.getElementById("plClose").addEventListener("click", closePlaylists);
document.getElementById("plOverlay").addEventListener("click", (e) => { if (e.target.id === "plOverlay") closePlaylists(); });

document.getElementById("playBtn").addEventListener("click", () => {
  if (audio.paused) { audio.play(); document.getElementById("playBtn").textContent = "⏸"; document.getElementById("pState").textContent="Reproduciendo"; }
  else { audio.pause(); document.getElementById("playBtn").textContent = "▶"; document.getElementById("pState").textContent="En pausa"; }
});
document.getElementById("nextBtn").addEventListener("click", () => playIndex(current + 1));
document.getElementById("prevBtn").addEventListener("click", () => playIndex(current - 1));
let repeatMode = 0; // 0 = no repetir · 1 = repetir todo · 2 = repetir una
audio.addEventListener("error", () => {
  const tr = queue[current];
  if (tr && /\.(m4a|m4b|aac)$/.test((tr.file || tr.name || "").toLowerCase()))
    document.getElementById("pState").textContent = "Este navegador no pudo reproducir el m4a (prueba en Chrome o Safari).";
});
audio.addEventListener("ended", () => {
  if (repeatMode === 2) { audio.currentTime = 0; audio.play(); return; }
  if (current + 1 < queue.length) playIndex(current + 1);
  else if (repeatMode === 1) playIndex(0);
});

// Repetir (3 modos) y barra de progreso desplazable
(function(){
  const seek = document.getElementById("seek");
  const curT = document.getElementById("curTime");
  const durT = document.getElementById("durTime");
  const repeatBtn = document.getElementById("repeatBtn");
  let seeking = false;
  function fmtT(s){ s = Math.floor(s || 0); return Math.floor(s/60) + ":" + String(s%60).padStart(2,"0"); }
  audio.addEventListener("loadedmetadata", () => { durT.textContent = fmtT(audio.duration); });
  audio.addEventListener("timeupdate", () => {
    if (seeking) return;
    const d = audio.duration || 0;
    seek.value = d ? (audio.currentTime / d * 1000) : 0;
    curT.textContent = fmtT(audio.currentTime);
  });
  seek.addEventListener("input", () => { seeking = true; const d = audio.duration || 0; curT.textContent = fmtT(d * seek.value / 1000); });
  seek.addEventListener("change", () => { const d = audio.duration || 0; audio.currentTime = d * seek.value / 1000; seeking = false; });
  repeatBtn.addEventListener("click", () => {
    repeatMode = (repeatMode + 1) % 3;
    repeatBtn.textContent = repeatMode === 2 ? "🔂" : "🔁";
    repeatBtn.classList.toggle("repeaton", repeatMode !== 0);
    repeatBtn.title = repeatMode === 0 ? "Repetir: no" : (repeatMode === 1 ? "Repetir todo" : "Repetir una");
  });
})();

function cleanName(n){ return n.replace(/\.[a-z0-9]{2,4}$/i, ""); }
// Si la misma canción está en varios formatos, deja solo una (prefiere m4a/AAC).
function dedupByFormat(files){
  const ext = n => (n.split('.').pop() || '').toLowerCase();
  const rank = n => (["m4a","m4b","aac","mp4"].includes(ext(n)) ? 2 : 1);
  const base = n => n.replace(/\.[^.]+$/, "").trim().toLowerCase();
  const best = {};
  files.forEach(f => { const b = base(f.name); if (!best[b] || rank(f.name) > rank(best[b].name)) best[b] = f; });
  return Object.values(best);
}
function esc(s){ return (s||"").replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
