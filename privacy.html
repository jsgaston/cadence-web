<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Política de privacidad — Cadence</title>
<meta name="description" content="Política de privacidad de Cadence / Cadence privacy policy.">
<link rel="icon" href="cadence-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0E1014; --surface:#16191F; --line:#2A2F3A;
    --accent:#7C9AFF; --text:#E8EAF0; --muted:#9AA3B2;
    --display:"Fraunces",Georgia,serif; --body:"Inter",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--ink);color:var(--text);font-family:var(--body);
    line-height:1.7;-webkit-font-smoothing:antialiased}
  a{color:var(--accent)}
  .wrap{max-width:760px;margin:0 auto;padding:0 24px}
  header{padding:24px;border-bottom:1px solid var(--line)}
  header .wrap{display:flex;align-items:center;gap:14px}
  header img{width:40px;height:40px;object-fit:contain}
  header .name{font-family:var(--display);font-weight:500;font-size:1.5rem}
  .head-right{margin-left:auto;display:flex;align-items:center;gap:16px}
  header a.back{font-size:.92rem}
  .lang{display:flex;gap:4px;border:1px solid var(--line);border-radius:999px;padding:4px}
  .lang-btn{border:0;background:transparent;color:var(--muted);cursor:pointer;
    font-family:var(--body);font-size:.8rem;font-weight:600;letter-spacing:.04em;
    padding:4px 10px;border-radius:999px}
  .lang-btn.active{background:var(--accent);color:#0b0d12}
  main{padding:48px 0 80px}
  h1{font-family:var(--display);font-weight:500;font-size:clamp(1.9rem,5vw,2.6rem);
    letter-spacing:-.01em;margin-bottom:6px}
  .updated{color:var(--muted);font-size:.92rem;margin-bottom:36px}
  h2{font-family:var(--display);font-weight:500;font-size:1.35rem;margin:34px 0 12px}
  p,li{color:#cfd4de;margin-bottom:12px}
  ul{padding-left:22px}
  strong{color:var(--text)}
  .box{background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:20px 22px;margin:18px 0}
  footer{border-top:1px solid var(--line);padding:30px 0;color:var(--muted);font-size:.9rem}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <img src="cadence-logo.png" alt="Cadence">
    <span class="name">Cadence</span>
    <div class="head-right">
      <a class="back" href="index.html" data-i18n="back"></a>
      <nav class="lang" aria-label="Idioma / Language">
        <button class="lang-btn" data-lang="es">ES</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </nav>
    </div>
  </div>
</header>

<main>
<div class="wrap">
  <h1 data-i18n="title"></h1>
  <p class="updated" data-i18n="updated"></p>
  <p data-i18n="intro"></p>
  <div class="box"><p style="margin-bottom:0" data-i18n="summary"></p></div>

  <h2 data-i18n="h_files"></h2>
  <p data-i18n="p_files"></p>

  <h2 data-i18n="h_drive"></h2>
  <p data-i18n="p_drive_intro"></p>
  <ul>
    <li data-i18n="drive_li1"></li>
    <li data-i18n="drive_li2"></li>
    <li data-i18n="drive_li3"></li>
  </ul>
  <p data-i18n="p_drive_policy"></p>

  <h2 data-i18n="h_radio"></h2>
  <p data-i18n="p_radio"></p>

  <h2 data-i18n="h_pod"></h2>
  <p data-i18n="p_pod"></p>

  <h2 data-i18n="h_perms"></h2>
  <ul>
    <li data-i18n="perm1"></li>
    <li data-i18n="perm2"></li>
    <li data-i18n="perm3"></li>
  </ul>

  <h2 data-i18n="h_ads"></h2>
  <p data-i18n="p_ads"></p>

  <h2 data-i18n="h_don"></h2>
  <p data-i18n="p_don"></p>

  <h2 data-i18n="h_minors"></h2>
  <p data-i18n="p_minors"></p>

  <h2 data-i18n="h_changes"></h2>
  <p data-i18n="p_changes"></p>

  <h2 data-i18n="h_contact"></h2>
  <p data-i18n="p_contact"></p>
</div>
</main>

<footer>
  <div class="wrap">© <span id="y"></span> Cadence · <a href="index.html">cadence-project.org</a></div>
</footer>

<!-- ============================================================= -->

<!-- ============================================================= -->

    h_contact: "Contacto",
    p_contact: 'Para cualquier duda sobre privacidad, escribe a <a href="mailto:jsgastoniriartecabrera@gmail.com">jsgastoniriartecabrera@gmail.com</a>.'

    intro: "Cadence is an Android app for playing music, audiobooks, podcasts, and radio. This policy explains what information the app handles and how. The core idea is simple: <strong>Cadence does not collect your personal data or send it to any server of ours</strong>, because we have no servers of our own.",

    p_minors: "Cadence is not directed at minors and does not knowingly collect data from them.",

    p_changes: "If the app changes in the future and handles data differently, we will update this page and its date.",

    p_contact: 'For any privacy questions, write to <a href="mailto:jsgastoniriartecabrera@gmail.com">jsgastoniriartecabrera@gmail.com</a>.'

};

function setLang(lang){
  const dict = I18N[lang] || I18N.es;
  document.documentElement.lang = lang;
  document.title = dict._title;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k = el.getAttribute('data-i18n');
    if(dict[k] !== undefined) el.innerHTML = dict[k];
  });
  document.querySelectorAll('.lang-btn').forEach(b=>
    b.classList.toggle('active', b.dataset.lang === lang));
  try{ localStorage.setItem('cadence_lang', lang); }catch(e){}
}
document.querySelectorAll('.lang-btn').forEach(b=>
  b.addEventListener('click', ()=>setLang(b.dataset.lang)));
let saved=null; try{ saved=localStorage.getItem('cadence_lang'); }catch(e){}
const auto=(navigator.language||'es').toLowerCase().startsWith('en')?'en':'es';
setLang(saved || auto);
document.getElementById('y').textContent=new Date().getFullYear();
</script>
</body>
</html>
