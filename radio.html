<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadence — Radio en el mapa</title>
<link rel="icon" href="cadence-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
  :root{
    --ink:#0E1014; --surface:#16191F; --surface-2:#1E222B; --line:#2A2F3A;
    --accent:#7C9AFF; --text:#E8EAF0; --muted:#9AA3B2;
    --display:"Fraunces",Georgia,serif; --body:"Inter",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--ink);color:var(--text);font-family:var(--body);height:100vh;
    display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  header{display:flex;align-items:center;gap:12px;padding:12px 18px;
    border-bottom:1px solid var(--line);flex-shrink:0}
  header img{width:30px;height:30px}
  header .name{font-family:var(--display);font-size:1.2rem;font-weight:500}
  header .back{margin-left:auto;color:var(--muted);font-size:.9rem}
  .controls{padding:10px 18px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;
    border-bottom:1px solid var(--line);flex-shrink:0}
  input,select{background:var(--surface-2);border:1px solid var(--line);border-radius:10px;
    padding:9px 12px;color:var(--text);font-family:var(--body);font-size:.92rem}
  input{flex:1;min-width:140px}
  input:focus,select:focus{outline:none;border-color:var(--accent)}
  button.go{background:var(--accent);color:#0b0d12;border:0;border-radius:10px;
    padding:9px 16px;font-weight:600;cursor:pointer;font-family:var(--body)}
  #map{flex:1;background:#0a1a14}
  .leaflet-popup-content-wrapper{background:var(--surface);color:var(--text);border:1px solid var(--line)}
  .leaflet-popup-tip{background:var(--surface)}
  .popup-name{font-weight:600;margin-bottom:6px}
  .popup-btn{background:var(--accent);color:#0b0d12;border:0;border-radius:8px;
    padding:6px 12px;font-weight:600;cursor:pointer;font-family:var(--body)}
  .status{padding:6px 18px;font-size:.85rem;color:var(--muted);flex-shrink:0}
  .player{background:rgba(22,25,31,.97);border-top:1px solid var(--line);
    padding:12px 18px;display:none;align-items:center;gap:14px;flex-shrink:0}
  .player.show{display:flex}
  .player .pinfo{flex:1;min-width:0}
  .ptitle{font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pstate{font-size:.78rem;color:var(--muted)}
  .pbtn{width:42px;height:42px;border-radius:50%;border:0;cursor:pointer;
    background:var(--accent);color:#0b0d12;font-size:1.1rem}
  /* racimos en tono Cadence */
  .marker-cluster{background:rgba(124,154,255,.25)}
  .marker-cluster div{background:rgba(124,154,255,.85);color:#0b0d12;font-weight:600}
</style>
</head>
<body>

<header>
  <img src="cadence-logo.png" alt="Cadence">
  <span class="name">Cadence · Radio</span>
  <a class="back" href="index.html">← Inicio</a>
</header>

<div class="controls">
  <input id="search" type="text" placeholder="Filtrar por país o género (ej. usa, jazz, reggae)... o vacío = mundo entero">
  <button id="searchBtn" class="go">Buscar</button>
</div>

<div id="map"></div>
<div id="status" class="status">Cargando mapa...</div>

<div id="player" class="player">
  <div class="pinfo">
    <div id="pTitle" class="ptitle">—</div>
    <div id="pState" class="pstate"></div>
  </div>
  <button id="playBtn" class="pbtn">⏸</button>
</div>
<audio id="audio"></audio>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
const API = "https://all.api.radio-browser.info/json";

// Mapa con relieve (montañas, ríos): capa topográfica.
const map = L.map("map", { worldCopyJump:true, minZoom:2 }).setView([25, 5], 2.4);
L.tileLayer("https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png", {
  attribution:'&copy; OpenTopoMap &copy; OpenStreetMap', maxZoom:16
}).addTo(map);

// Capa de racimos (clustering) para aguantar miles de puntos.
const cluster = L.markerClusterGroup({ chunkedLoading:true, maxClusterRadius:45 });
map.addLayer(cluster);

const audio = document.getElementById("audio");
const setStatus = m => document.getElementById("status").textContent = m;

function radioIcon(){
  return L.divIcon({ className:"",
    html:'<div style="width:11px;height:11px;border-radius:50%;background:#7C9AFF;border:2px solid #0E1014;box-shadow:0 0 5px rgba(124,154,255,.9)"></div>',
    iconSize:[11,11] });
}

// Centro aproximado por país (para emisoras sin coordenadas exactas).
const COUNTRY_CENTER = {
  "US":[39,-98],"ES":[40,-3.7],"MX":[23,-102],"AR":[-34,-64],"GB":[54,-2],"FR":[46,2],
  "DE":[51,10],"IT":[42,12],"BR":[-10,-55],"CO":[4,-72],"CL":[-30,-71],"PE":[-10,-76],
  "CA":[56,-106],"AU":[-25,133],"JP":[36,138],"IN":[22,79],"RU":[61,105],"CN":[35,105],
  "PT":[39,-8],"NL":[52,5],"BE":[50,4],"SE":[62,15],"PL":[52,19],"GR":[39,22],"TR":[39,35],
  "EG":[26,30],"ZA":[-29,24],"NG":[9,8],"MA":[32,-6],"UA":[49,32],"IE":[53,-8]
};

function jitter(v){ return v + (Math.random()-0.5)*4; } // desperdiga dentro del país

async function loadStations(params){
  setStatus("Cargando emisoras...");
  cluster.clearLayers();
  try {
    const url = API + "/stations/search?" + params + "&hidebroken=true&limit=5000&order=clickcount&reverse=true";
    const res = await fetch(url, { headers:{ "User-Agent":"Cadence/1.0" } });
    const data = await res.json();
    const valid = data.filter(s => s.url_resolved);
    let placed = 0;
    const batch = [];
    valid.forEach(s => {
      let lat = parseFloat(s.geo_lat), lon = parseFloat(s.geo_long);
      if (!lat || !lon) {
        const c = COUNTRY_CENTER[s.countrycode];
        if (!c) return;           // sin coordenadas y país desconocido -> fuera
        lat = jitter(c[0]); lon = jitter(c[1]);
      }
      const m = L.marker([lat, lon], { icon: radioIcon() });
      m.bindPopup(
        '<div class="popup-name">' + escapeHtml(s.name||"Emisora") + '</div>' +
        '<div style="color:#9AA3B2;font-size:.8rem;margin-bottom:8px">' +
          escapeHtml((s.country||"") + (s.tags ? " · " + s.tags.split(",")[0] : "")) + '</div>' +
        '<button class="popup-btn" onclick="playStation(\'' +
          encodeURIComponent(s.url_resolved) + '\',\'' + encodeURIComponent(s.name||"Emisora") + '\')">▶ Escuchar</button>'
      );
      batch.push(m); placed++;
    });
    cluster.addLayers(batch);
    setStatus(placed + " emisoras en el mapa. Acércate y pincha un racimo.");
  } catch(e){ setStatus("Error cargando emisoras: " + e.message); }
}

window.playStation = function(urlEnc, nameEnc){
  const url = decodeURIComponent(urlEnc), name = decodeURIComponent(nameEnc);
  document.getElementById("player").classList.add("show");
  document.getElementById("pTitle").textContent = name;
  document.getElementById("pState").textContent = "Conectando...";
  audio.src = url;
  audio.play()
    .then(()=>{ document.getElementById("pState").textContent="En directo"; document.getElementById("playBtn").textContent="⏸"; })
    .catch(()=>{ document.getElementById("pState").textContent="No se pudo reproducir"; });
};
document.getElementById("playBtn").addEventListener("click", ()=>{
  if(audio.paused){ audio.play(); document.getElementById("playBtn").textContent="⏸"; document.getElementById("pState").textContent="En directo"; }
  else { audio.pause(); document.getElementById("playBtn").textContent="▶"; document.getElementById("pState").textContent="En pausa"; }
});

document.getElementById("searchBtn").addEventListener("click", doSearch);
document.getElementById("search").addEventListener("keydown", e=>{ if(e.key==="Enter") doSearch(); });
function doSearch(){
  const q = document.getElementById("search").value.trim().toLowerCase();
  if(!q){ loadStations("order=clickcount&reverse=true"); return; } // mundo: top por popularidad
  // país por código común, si no, por etiqueta/nombre
  const codes = {"usa":"US","eeuu":"US","estados unidos":"US","españa":"ES","espana":"ES",
    "mexico":"MX","méxico":"MX","argentina":"AR","reino unido":"GB","uk":"GB","francia":"FR",
    "alemania":"DE","italia":"IT","brasil":"BR","japon":"JP","japón":"JP"};
  if (codes[q]) loadStations("countrycode=" + codes[q]);
  else loadStations("tagList=" + encodeURIComponent(q));
}

function escapeHtml(s){ return (s||"").replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// Carga inicial: las más populares del mundo entero.
loadStations("order=clickcount&reverse=true");
</script>
</body>
</html>
